# ============================================================================
# PATTERNS D'EXAMEN — Template
# ============================================================================
#
# Un fichier par module. Contient les variantes d'exercices d'examen
# classifiees par praxeologie, avec frequences et exemples reels.
#
# Emplacement : content/{programme}/{module}/_patterns.yaml
#
# Workflow :
#   1. WF1 cree la KB (praxeologies abstraites)
#   2. WF1+ cree/enrichit ce fichier (variantes concretes)
#   3. WF1+ est appele N fois (iteratif) avec de nouvelles sources
#   4. WF2 utilise les patterns pour planifier le Livret 2 (Examen)
#   5. WF3 instancie les patterns en exercices concrets
#
# ============================================================================

module: "{slug-module}"                           # Ex: nombre-derive
programme: "{slug-programme}"                     # Ex: 3eme-math
version: 1                                        # Incrementer a chaque enrichissement WF1+

# ============================================================================
# Patterns — liste des variantes d'examen
# ============================================================================
#
# Chaque pattern instancie une praxeologie de la KB (section 8).
# Un pattern = une facon concrete dont une praxeologie apparait en examen.
#
# Regles :
#   - ID : {Praxeologie}.v{numero} (ex: Prax3.v1, Prax3.v2)
#   - praxeology : reference vers la KB (Prax1, Prax2, etc.)
#   - frequency : nombre d'occurrences observees dans les sources
#   - examples : exercices REELS (pas inventes), avec source
#   - variables : ce qui change d'un exercice a l'autre
#   - method : etapes de resolution (pas la solution, la methode)
#   - Seuil : au-dela de ~10 variantes par praxeologie, regrouper
#
# ============================================================================

patterns:

  # --- Pattern 1 ---
  - id: Prax1.v1
    praxeology: Prax1                             # Reference KB section 8
    name: "{Nom court de la variante}"
    description: >-
      {Ce que l'eleve doit faire dans cette variante.
      Assez precis pour distinguer cette variante des autres.}
    method:
      - "{Etape 1 de la methode de resolution}"
      - "{Etape 2}"
      - "{Etape 3}"
    variables:                                    # Ce qui change entre instances
      function: ["{f(x) = ...}", "{g(x) = ...}"]
      interval: ["[a,b]", "[c,d]"]
      # Ajouter d'autres variables selon le pattern
    difficulty: 1                                 # 0-3, coherent avec la KB
    frequency: 0                                  # Nombre d'occurrences dans les sources
    sources: []                                   # Ex: ["Manuel T1 p.35 ex.1", "BAC 2024 ex.3a"]
    examples: []                                  # Exercices reels (voir format ci-dessous)

  # --- Pattern 2 (meme praxeologie, variante differente) ---
  - id: Prax1.v2
    praxeology: Prax1
    name: "{Autre variante de la meme praxeologie}"
    description: >-
      {Description de ce qui distingue cette variante.}
    method:
      - "{Etape 1}"
      - "{Etape 2}"
    variables:
      parameter: ["{valeur1}", "{valeur2}"]
    difficulty: 2
    frequency: 0
    sources: []
    examples: []

  # --- Pattern 3 (praxeologie differente) ---
  - id: Prax2.v1
    praxeology: Prax2
    name: "{Variante de Prax2}"
    description: >-
      {Description.}
    method:
      - "{Etape 1}"
    variables:
      type_fonction: ["{polynome}", "{rationnelle}"]
    difficulty: 1
    frequency: 0
    sources: []
    examples: []

# ============================================================================
# Format des exemples
# ============================================================================
#
# Chaque exemple est un exercice REEL (pas invente) avec :
#
#   examples:
#     - title: "BAC 2024 — Exercice 3a"
#       enonce: >-
#         Soit f la fonction definie sur [0,2] par f(x) = x³ - 3x + 1.
#         Montrer que l'equation f(x) = 0 admet une unique solution
#         dans [0,1].
#       sketch: >-
#         f(0)=1>0, f(1)=-1<0, f continue sur [0,1] → TVI.
#         f'(x)=3x²-3<0 sur ]0,1[ → strictement decroissante → unicite.
#
# Regles :
#   - title : source + reference (ex: "Manuel T1 ex.5", "BAC 2024 ex.3a")
#   - enonce : texte EXACT de l'exercice source (pas reformule)
#   - sketch : grandes lignes de la solution (pas la solution complete)
#   - Ne pas inventer d'exemples — uniquement des exercices reels observes
#
# ============================================================================

# ============================================================================
# Notes pour le LLM (WF1+)
# ============================================================================
#
# 1. Toujours charger la KB module avant d'enrichir les patterns
# 2. Chaque exercice analyse doit etre rattache a une praxeologie existante
# 3. Si un exercice ne correspond a aucune praxeologie → signaler, ne pas
#    creer de pattern orphelin
# 4. Si plusieurs exercices sont tres similaires (meme methode, memes
#    variables, seules les valeurs changent) → c'est la MEME variante,
#    incrementer frequency et ajouter la source
# 5. Si la methode ou la structure differe → c'est une NOUVELLE variante
# 6. Les `variables` doivent capturer ce qui fait la "parametricite"
#    du pattern : quels elements un generateur peut changer pour creer
#    un nouvel exercice du meme type
# 7. Toujours incrementer `version` apres modification
#
# ============================================================================
