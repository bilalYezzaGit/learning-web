# Lexique et regles redactionnelles — Continuite

module: continuite
programme: 3eme-math

# ---------------------------------------------------------------------------
# Notations specifiques au module
# ---------------------------------------------------------------------------
notations:
  - symbol: "alpha, beta"
    meaning: "Tolerances dans la definition de la continuite (convention tunisienne, PAS epsilon-delta)"
  - symbol: "E(x)"
    meaning: "Partie entiere (pas la notation crochet)"
  - symbol: "C_f, zeta_f, C"
    meaning: "Courbe representative (selon la source)"
  - symbol: "f(I), f([a,b])"
    meaning: "Image d'un intervalle"

# ---------------------------------------------------------------------------
# Formules de redaction consacrees
# ---------------------------------------------------------------------------
redaction_formulas:
  justification_type:
    description: "Quand on justifie la continuite par le type de fonction"
    template: "f est une fonction {type}, donc continue en a"
    examples:
      - "f est une fonction polynome, donc continue en a"
      - "f est une fonction rationnelle dont le denominateur ne s'annule pas en a, donc continue en a"

  justification_operations:
    description: "Quand on justifie par les operations"
    template: "f et g sont continues en a, donc {operation} est continue en a"

  condition_quotient:
    template: "g est continue en a et g(a) != 0, donc f/g est continue en a"

  condition_sqrt:
    template: "f est continue en a et f(a) > 0, donc sqrt(f) est continue en a"

  tvi:
    template: >-
      f est continue sur [a,b]. f(a) = ... et f(b) = ...
      D'ou f(a).f(b) < 0. Par le theoreme des valeurs intermediaires,
      l'equation f(x) = 0 admet au moins une solution dans ]a, b[.

  unicite:
    template: >-
      De plus, f est strictement {croissante/decroissante} sur [a,b],
      donc la solution est unique.

  image:
    template: >-
      f est continue et {croissante/decroissante} sur [a,b],
      donc f([a,b]) = [{borne_inf}, {borne_sup}].

# ---------------------------------------------------------------------------
# Niveau de rigueur attendu
# ---------------------------------------------------------------------------
rigor_rules:
  - context: "Continuite par morceaux"
    rule: "TOUJOURS calculer les limites laterales et comparer avec f(x0)"
  - context: "Application du TVI"
    rule: "TOUJOURS verifier la continuite avant d'appliquer"
  - context: "Unicite"
    rule: "TOUJOURS preciser la monotonie (pas de raccourci)"
  - context: "Image d'un intervalle"
    rule: "TOUJOURS dresser le tableau de variation avant de donner f(I)"

# ---------------------------------------------------------------------------
# Longueur type des redactions
# ---------------------------------------------------------------------------
typical_lengths:
  - type: "Justification de continuite simple"
    lines: { min: 2, typical: 3, max: 4 }
  - type: "Continuite par morceaux"
    lines: { min: 6, typical: 8, max: 10 }
  - type: "Application du TVI"
    lines: { min: 4, typical: 5, max: 6 }
  - type: "TVI + unicite"
    lines: { min: 6, typical: 7, max: 8 }
  - type: "Image d'un intervalle"
    lines: { min: 5, typical: 6, max: 8 }
  - type: "Dichotomie"
    lines: { min: 8, typical: 10, max: 15 }
