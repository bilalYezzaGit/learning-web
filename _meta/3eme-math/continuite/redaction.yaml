# Modeles de redaction — Continuite
# Templates structures par praxeologie pour generation LLM et correction
# Chaque modele decrit EXACTEMENT comment un bon eleve doit rediger

module: continuite
programme: 3eme-math

redaction_models:
  # -------------------------------------------------------------------------
  - praxeology: Prax1
    name: "Justification par type de fonction"

    template: |
      $f$ est une fonction {type_fonction}, donc continue {lieu}.

    variants:
      type_fonction:
        polynome: "polynome"
        rationnelle: "rationnelle dont le denominateur ne s'annule pas en $a$"
        sqrt: "de la forme $\\sqrt{u}$ ou $u$ est continue et strictement positive en $a$"
      lieu:
        en_point: "en $a$"
        sur_intervalle: "sur ${intervalle}$"

    expected_lines: { min: 2, typical: 2, max: 3 }

    grading_criteria:
      - criterion: "Identification correcte du type de fonction"
        weight: 0.4
        required: true
      - criterion: "Citation du theoreme correspondant"
        weight: 0.3
        required: true
      - criterion: "Verification des conditions (domaine, denominateur, sqrt > 0)"
        weight: 0.3
        required: true

  # -------------------------------------------------------------------------
  - praxeology: Prax3
    name: "Continuite par morceaux"

    template: |
      **Sur chaque morceau :**
      - Sur ${I_1}$ : $f(x) = {expr_1}$ est {type_1}, donc continue sur ${I_1}$.
      - Sur ${I_2}$ : $f(x) = {expr_2}$ est {type_2}, donc continue sur ${I_2}$.

      **Au point de raccordement $x_0 = {x0}$ :**
      $\lim_{x \to {x0}^-} f(x) = {lim_gauche}$
      $\lim_{x \to {x0}^+} f(x) = {lim_droite}$
      $f({x0}) = {f_x0}$

      {conclusion}

    variants:
      conclusion:
        continue: >-
          Les trois valeurs sont egales, donc $f$ est continue en ${x0}$.
          Par suite, $f$ est continue sur ${intervalle_total}$.
        discontinue: >-
          $\lim_{x \to {x0}^-} f(x) \neq \lim_{x \to {x0}^+} f(x)$
          (ou $\neq f({x0})$), donc $f$ n'est pas continue en ${x0}$.

    expected_lines: { min: 6, typical: 8, max: 10 }

    grading_criteria:
      - criterion: "Continuite sur chaque morceau ouvert"
        weight: 0.2
        required: true
      - criterion: "Calcul des limites laterales"
        weight: 0.3
        required: true
      - criterion: "Comparaison avec f(x0)"
        weight: 0.2
        required: true
      - criterion: "Conclusion correcte"
        weight: 0.3
        required: true
        must_include: ["continue en", "donc"]

  # -------------------------------------------------------------------------
  - praxeology: Prax4
    name: "Application du TVI"

    template: |
      $f$ est {justification_continuite} sur $[{a}, {b}]$.

      $f({a}) = {val_a}$ et $f({b}) = {val_b}$.

      {transition_signe}

      D'apres le theoreme des valeurs intermediaires, l'equation $f(x) = {cible}$ admet au moins une solution ${var}$ dans $]{a}, {b}[$.

    variants:
      justification_continuite:
        polynome: "une fonction polynome, donc continue"
        rationnelle: "une fonction rationnelle dont le denominateur ne s'annule pas sur $[{a}, {b}]$, donc continue"
        operations: "continue sur $[{a}, {b}]$ comme {detail_operations}"
      transition_signe:
        produit: "D'ou $f({a}) \\times f({b}) = {produit} < 0$."
        encadrement: "Ainsi ${val_a} < {cible} < {val_b}$ (ou inversement), donc ${cible}$ est entre $f({a})$ et $f({b})$."
      cible:
        zero: "0"
        valeur: "{k}"

    expected_lines: { min: 4, typical: 5, max: 7 }

    grading_criteria:
      - criterion: "Justification de la continuite"
        weight: 0.25
        required: true
        common_omission: "Beaucoup d'eleves sautent cette etape"
      - criterion: "Calcul de f(a) et f(b)"
        weight: 0.25
        required: true
      - criterion: "Verification du changement de signe ou encadrement"
        weight: 0.25
        required: true
      - criterion: "Conclusion avec formulation correcte"
        weight: 0.25
        required: true
        must_include: ["theoreme des valeurs intermediaires", "au moins une solution", "]"]

  # -------------------------------------------------------------------------
  - praxeology: Prax5
    name: "TVI + Unicite par monotonie"
    extends: Prax4

    template: |
      {redaction_tvi}

      De plus, $f'(x) = {derivee}$ {signe_derivee} sur $]{a}, {b}[$.

      Donc $f$ est strictement {monotonie} sur $[{a}, {b}]$.

      Par suite, la solution ${var}$ est **unique** dans $]{a}, {b}[$.

    additional_lines: 3

    grading_criteria:
      - criterion: "Existence par TVI (cf. Prax4)"
        weight: 0.4
        required: true
      - criterion: "Justification de la monotonie stricte"
        weight: 0.3
        required: true
        must_include: ["strictement"]
      - criterion: "Conclusion d'unicite"
        weight: 0.3
        required: true
        must_include: ["unique"]

  # -------------------------------------------------------------------------
  - praxeology: Prax6
    name: "Image d'un intervalle"

    template: |
      D'apres le tableau de variation, $f$ est {monotonie} sur $[{a}, {b}]$.

      $f({a}) = {val_a}$ et $f({b}) = {val_b}$.

      Donc $f([{a}, {b}]) = [{borne_inf}, {borne_sup}]$.

    variants:
      monotonie:
        croissante: "strictement croissante"
        decroissante: "strictement decroissante"
        non_monotone: |
          $f$ admet un {type_extremum} en $x_0 = {x0}$ egal a $f({x0}) = {val_x0}$.
          On decompose : $f$ est {mono1} sur $[{a}, {x0}]$ et {mono2} sur $[{x0}, {b}]$.
          Donc $f([{a}, {b}]) = [{min}, {max}]$.

    expected_lines: { min: 4, typical: 6, max: 8 }

    grading_criteria:
      - criterion: "Reference au tableau de variation"
        weight: 0.3
        required: true
      - criterion: "Valeurs aux bornes et extrema"
        weight: 0.3
        required: true
      - criterion: "Notation correcte de l'image (bornes ouvertes/fermees)"
        weight: 0.4
        required: true

  # -------------------------------------------------------------------------
  - praxeology: Prax7
    name: "Dichotomie"

    template: |
      On sait que $f({a_0}) \\times f({b_0}) < 0$, donc ${var}$ est dans $]{a_0}, {b_0}[$.

      | Etape | $a$ | $b$ | $m = (a+b)/2$ | $f(m)$ | Signe | Nouvel intervalle |
      |-------|-----|-----|---------------|--------|-------|-------------------|
      | 1     | {a_0} | {b_0} | {m_1} | {f_m1} | {s_1} | $]{new_a1}, {new_b1}[$ |
      | ...   | ... | ... | ... | ... | ... | ... |

      Conclusion : ${var} \\in [{encadrement_final}]$ a $10^{-{precision}}$ pres.

    expected_lines: { min: 8, typical: 10, max: 15 }

    grading_criteria:
      - criterion: "Point de depart correct (f(a).f(b) < 0)"
        weight: 0.2
        required: true
      - criterion: "Calcul correct du milieu"
        weight: 0.2
        required: true
      - criterion: "Test de signe correct a chaque etape"
        weight: 0.3
        required: true
      - criterion: "Precision atteinte"
        weight: 0.3
        required: true

  # -------------------------------------------------------------------------
  - praxeology: Prax8
    name: "Nombre de solutions"

    template: |
      **Etude de $f$ :**
      $f'(x) = {derivee}$
      $f'(x) = 0 \\Leftrightarrow {zeros_derivee}$

      **Tableau de variation :**
      ```typst
      {tableau_variation}
      ```

      **Comptage des solutions :**
      {analyse_par_intervalle}

      Conclusion : l'equation $f(x) = 0$ admet exactement **{n}** solutions.

    expected_lines: { min: 10, typical: 14, max: 20 }

    grading_criteria:
      - criterion: "Derivee correcte et factorisee"
        weight: 0.2
        required: true
      - criterion: "Tableau de variation complet"
        weight: 0.3
        required: true
      - criterion: "Application TVI + unicite sur chaque intervalle"
        weight: 0.3
        required: true
      - criterion: "Conclusion avec nombre exact"
        weight: 0.2
        required: true
        must_include: ["exactement"]

  # -------------------------------------------------------------------------
  - praxeology: Prax10
    name: "Continuite par definition alpha-beta"

    template: |
      Soit $\\beta > 0$.

      $|f(x) - f({a})| = |{expression_simplifiee}|$

      {majoration}

      Posons $\\alpha = {alpha_en_fonction_beta}$.

      Si $|x - {a}| < \\alpha$, alors $|f(x) - f({a})| < \\beta$.

      Donc $f$ est continue en ${a}$.

    expected_lines: { min: 5, typical: 7, max: 10 }

    grading_criteria:
      - criterion: "Ecriture correcte de |f(x) - f(a)|"
        weight: 0.25
        required: true
      - criterion: "Majoration valide"
        weight: 0.3
        required: true
      - criterion: "Choix correct de alpha"
        weight: 0.25
        required: true
      - criterion: "Conclusion formelle"
        weight: 0.2
        required: true
