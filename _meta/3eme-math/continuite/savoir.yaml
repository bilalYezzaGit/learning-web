# ---------------------------------------------------------------------------
# 7) EXEMPLES CANONIQUES
# ---------------------------------------------------------------------------
canonical_examples:
  - id: EC1
    description: "f(x) = 2x - 1, montrer la continuite en a = 2 par la definition alpha-beta"
    illustrates: "Definition avec une fonction affine (alpha = beta/2)"
    concepts: [N1]
    difficulty: 1

  - id: EC2
    description: "f(x) = sqrt(x-2)/(x^2+2x+5), justifier la continuite en 2"
    illustrates: "Composition d'operations (sqrt + polynome + quotient)"
    concepts: [N3]
    difficulty: 1

  - id: EC3
    description: "f(x) = E(x) (partie entiere), etudier la continuite"
    illustrates: "Discontinuite en tout entier (contre-exemple fondamental)"
    concepts: [N1]
    difficulty: 1

  - id: EC4
    description: "f par morceaux {2x+1 si x>1, 3 si x=1, 3x-1 si x<1}, continuite en 1"
    illustrates: "Continuite laterale"
    concepts: [N4]
    difficulty: 2

  - id: EC5
    description: "f(x) = x^3 + 3x/2 + 1, montrer que f(x) = 0 admet une solution dans [-2, 1]"
    illustrates: "Application du TVI (f(-2) < 0, f(1) > 0)"
    concepts: [N7]
    difficulty: 1

  - id: EC6
    description: "f(x) = x^4 - 4x^2 - x + 1, montrer exactement 4 solutions"
    illustrates: "Comptage de solutions par TVI + tableau de variation"
    concepts: [N8]
    difficulty: 2

  - id: EC7
    description: "sqrt(x-2) = 8/x^2, existence d'une solution sur [3, +inf["
    illustrates: "Intersection de courbes (h(x) = f(x) - g(x))"
    concepts: [N8]
    difficulty: 2

  - id: EC8
    description: "Approximation d'un zero a 10^-2 par dichotomie"
    illustrates: "Methode pratique (tableau de valeurs successifs)"
    concepts: [N8]
    difficulty: 1
