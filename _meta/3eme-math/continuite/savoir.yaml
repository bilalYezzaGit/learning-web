# Savoir — Continuite
# Format structure pour lecture humaine (profs) et machine (LLM, pipeline)

module: continuite
programme: 3eme-math
version: 2.0

# ---------------------------------------------------------------------------
# 0) OBJECTIF (1 phrase)
# ---------------------------------------------------------------------------
objective: >-
  Maitriser la notion de continuite d'une fonction en un point et sur un
  intervalle, exploiter les operations sur les fonctions continues, et
  appliquer le theoreme des valeurs intermediaires pour prouver l'existence
  et l'unicite de solutions d'equations.

# ---------------------------------------------------------------------------
# 1) NIVEAU EPISTEMIQUE
# Definit ce qui est admis, demontre ou exclu pour CE programme.
# C'est la piece maitresse qui distingue un cours de prepa d'un cours lycee.
# ---------------------------------------------------------------------------
epistemic_level:
  theory_base: "analyse-reelle-elementaire"
  # Pas de topologie, pas d'espaces metriques, pas d'epsilon-delta standard

  admitted:
    - id: T1
      statement: >-
        Toute fonction constante, lineaire, affine, x^2 est continue en tout
        reel. Toute fonction polynome est continue sur R. Toute fonction
        rationnelle est continue sur son ensemble de definition. sqrt(x) est
        continue sur R+*.
      justification: "Admis — demonstration par epsilon-delta hors programme"

    - id: T7
      statement: >-
        L'image d'un intervalle par une fonction continue est un intervalle.
      justification: "Admis — demonstration par connexite hors programme"

    - id: T8
      statement: >-
        (TVI) Soit f continue sur [a,b]. Pour tout k entre f(a) et f(b),
        l'equation f(x) = k admet au moins une solution dans [a,b].
      justification: "Admis — demonstration par borne superieure hors programme"

  demonstrated:
    - id: T2
      statement: "Si f et g sont continues en a et k un reel, alors f+g, f.g, k.f sont continues en a"
      proof_type: demonstration-complete

    - id: T3
      statement: "Si f est continue en a et f(a) != 0, alors 1/f est continue en a"
      proof_type: demonstration-complete

    - id: T4
      statement: "Si f est continue en a, alors |f| est continue en a"
      proof_type: demonstration-complete

    - id: T5
      statement: "Si f est continue en a et f(a) > 0, alors sqrt(f) est continue en a"
      proof_type: demonstration-complete

    - id: T6
      statement: "f est continue en a <=> f est continue a droite et a gauche en a"
      proof_type: demonstration-complete

    - id: T9
      statement: "Si de plus f est strictement monotone sur [a,b], la solution est unique"
      proof_type: demonstration-complete

  excluded:
    - "Continuite uniforme"
    - "Theoreme de Heine (continuite uniforme sur un compact)"
    - "Theoreme de Bolzano-Weierstrass"
    - "Definition epsilon-delta standard (le programme tunisien utilise alpha-beta)"
    - "Fonctions trigonometriques"
    - "Theoreme des bornes atteintes (mentionne mais pas approfondi)"
    - "Continuite et derivabilite (module nombre-derive)"

  starting_point:
    - "Notion de limite (module generalites-fonctions)"
    - "Operations sur les limites"
    - "Fonctions usuelles (polynome, rationnelle, racine carree)"
    - "Inegalites, valeur absolue, intervalles"

# ---------------------------------------------------------------------------
# 2) TRANSPOSITION DIDACTIQUE
# ---------------------------------------------------------------------------
transposition:
  savoir_savant:
    - "Definition topologique de la continuite (epsilon-delta, Weierstrass)"
    - "Theoreme des valeurs intermediaires (Bolzano, 1817)"
    - "Theoreme de l'image continue d'un connexe"
    - "Proprietes des fonctions continues sur les compacts"

  savoir_a_enseigner:
    - "La definition utilise alpha et beta (convention tunisienne, pas epsilon-delta)"
    - "Le TVI est le theoreme central : existence d'au moins une solution"
    - "L'unicite est obtenue en ajoutant la monotonie stricte (theoreme separe)"
    - "L'image d'un intervalle par une fonction continue est admise"
    - "La dichotomie est presentee comme methode pratique d'approximation"

  adaptations_didactiques:
    - "Introduction graphique : 'la courbe peut etre tracee sans lever le crayon'"
    - "La definition alpha-beta est motivee par des rectangles de tolerance"
    - "La partie entiere E(x) sert de contre-exemple fondamental"
    - "Le TVI est illustre par des applications concretes avant l'enonce formel"
    - "La dichotomie est illustree par le calcul effectif (tableaux de valeurs)"

# ---------------------------------------------------------------------------
# 3) PREREQUISITES & LIENS INTER-MODULES
# ---------------------------------------------------------------------------
prerequisites:
  required:
    - module: generalites-fonctions
      description: "Ensemble de definition, image, domaine, representation graphique"
    - prior_knowledge: "Inegalites, valeur absolue, intervalles, polynomes, fonctions rationnelles, racine carree"

  opens_toward:
    - module: nombre-derive
      link: "Le theoreme 'derivable => continu' utilise la continuite"
    - module: fonction-derivee
      link: "Etude de variations qui utilise la continuite sur un intervalle"

# ---------------------------------------------------------------------------
# 4) CARTE CONCEPTUELLE (dependances intra-module)
# ---------------------------------------------------------------------------
concepts:
  - id: N1
    name: "Continuite en un point"
    bloom_level: comprendre
    depends_on: []
    sub_concepts:
      - id: N1.1
        name: "Definition alpha-beta (convention tunisienne)"
      - id: N1.2
        name: "Interpretation graphique (trace sans lever le crayon)"
      - id: N1.3
        name: "Discontinuite en un point (saut, point isole)"

  - id: N2
    name: "Continuite des fonctions usuelles"
    bloom_level: memoriser
    depends_on: [N1]
    sub_concepts:
      - id: N2.1
        name: "Constante, identite, lineaire, affine"
      - id: N2.2
        name: "x^2, polynomes"
      - id: N2.3
        name: "1/x, fonctions rationnelles"
      - id: N2.4
        name: "sqrt(x), sqrt(f(x))"

  - id: N3
    name: "Operations sur les fonctions continues"
    bloom_level: appliquer
    depends_on: [N1, N2]
    sub_concepts:
      - id: N3.1
        name: "Somme, produit, combinaison lineaire"
      - id: N3.2
        name: "Inverse 1/f (condition f(a) != 0)"
      - id: N3.3
        name: "Quotient f/g (condition g(a) != 0)"
      - id: N3.4
        name: "Valeur absolue |f|"
      - id: N3.5
        name: "Racine carree sqrt(f) (condition f(a) > 0)"

  - id: N4
    name: "Continuite laterale"
    bloom_level: comprendre
    depends_on: [N1]
    sub_concepts:
      - id: N4.1
        name: "Continuite a droite en a"
      - id: N4.2
        name: "Continuite a gauche en a"
      - id: N4.3
        name: "Theoreme : f continue en a <=> f continue a droite et a gauche en a"

  - id: N5
    name: "Continuite sur un intervalle"
    bloom_level: comprendre
    depends_on: [N1, N4]
    sub_concepts:
      - id: N5.1
        name: "Definitions (intervalle ouvert, ferme, semi-ouvert)"
      - id: N5.2
        name: "Consequence : continuite sur tout sous-intervalle"

  - id: N6
    name: "Image d'un intervalle"
    bloom_level: appliquer
    depends_on: [N5]
    sub_concepts:
      - id: N6.1
        name: "Theoreme : l'image d'un intervalle par une fonction continue est un intervalle"
      - id: N6.2
        name: "Determination de f(I) par le tableau de variation"

  - id: N7
    name: "Theoreme des valeurs intermediaires (TVI)"
    bloom_level: appliquer
    depends_on: [N5, N6]
    sub_concepts:
      - id: N7.1
        name: "Enonce general (existence d'au moins une solution)"
      - id: N7.2
        name: "Cas particulier : localisation d'un zero (f(a).f(b) < 0)"
      - id: N7.3
        name: "Unicite par monotonie stricte"

  - id: N8
    name: "Applications"
    bloom_level: analyser
    depends_on: [N7]
    sub_concepts:
      - id: N8.1
        name: "Approximation par dichotomie"
      - id: N8.2
        name: "Nombre de solutions d'une equation"
      - id: N8.3
        name: "Intersection de courbes (f(x) = g(x) via h(x) = f(x) - g(x))"

# ---------------------------------------------------------------------------
# 5) THEOREMES & PROPRIETES CLES
# ---------------------------------------------------------------------------
theorems:
  - id: D1
    type: definition
    name: "Continuite en un point (alpha-beta)"
    statement: >-
      Soit f definie sur un intervalle ouvert I et a un reel de I.
      f est continue en a si : pour tout beta > 0, il existe alpha > 0
      tel que si x dans I et |x-a| < alpha, alors |f(x)-f(a)| < beta.
    status: definition
    concepts: [N1]
    used_in: [Prax1, Prax10]

  - id: D2
    type: definition
    name: "Continuite a droite"
    statement: >-
      f est continue a droite en a si pour tout beta > 0, il existe alpha > 0
      tel que 0 <= x-a < alpha implique |f(x)-f(a)| < beta.
    status: definition
    concepts: [N4]
    used_in: [Prax3]

  - id: D3
    type: definition
    name: "Continuite a gauche"
    statement: >-
      f est continue a gauche en a si pour tout beta > 0, il existe alpha > 0
      tel que 0 <= a-x < alpha implique |f(x)-f(a)| < beta.
    status: definition
    concepts: [N4]
    used_in: [Prax3]

  - id: T1
    type: theorem
    name: "Continuite des fonctions usuelles"
    statement: >-
      Toute fonction constante, lineaire, affine, x^2 est continue en tout reel.
      Toute fonction polynome est continue sur R.
      Toute fonction rationnelle est continue sur son ensemble de definition.
      sqrt(x) est continue sur R+*.
    status: admis
    concepts: [N2]
    used_in: [Prax1, Prax2]

  - id: T2
    type: theorem
    name: "Operations — somme, produit"
    statement: "Si f et g sont continues en a et k un reel, alors f+g, f.g, k.f sont continues en a"
    status: demontre
    concepts: [N3]
    used_in: [Prax2]

  - id: T3
    type: theorem
    name: "Operations — inverse, quotient"
    statement: "Si f est continue en a et f(a) != 0, alors 1/f est continue en a. Si g(a) != 0, alors f/g est continue en a"
    status: demontre
    concepts: [N3]
    used_in: [Prax2]

  - id: T4
    type: theorem
    name: "Operations — valeur absolue"
    statement: "Si f est continue en a, alors |f| est continue en a"
    status: demontre
    concepts: [N3]
    used_in: [Prax2]

  - id: T5
    type: theorem
    name: "Operations — racine carree"
    statement: "Si f est continue en a et f(a) > 0, alors sqrt(f) est continue en a"
    status: demontre
    concepts: [N3]
    used_in: [Prax2, Prax9]

  - id: T6
    type: theorem
    name: "Continuite laterale"
    statement: "f est continue en a <=> f est continue a droite et a gauche en a"
    status: demontre
    concepts: [N4]
    used_in: [Prax3]

  - id: T7
    type: theorem
    name: "Image d'un intervalle"
    statement: "L'image d'un intervalle par une fonction continue est un intervalle"
    status: admis
    concepts: [N6]
    used_in: [Prax6]

  - id: T8
    type: theorem
    name: "Theoreme des valeurs intermediaires (TVI)"
    statement: >-
      Soit f continue sur [a,b]. Pour tout k entre f(a) et f(b),
      l'equation f(x) = k admet au moins une solution dans [a,b].
    status: admis
    concepts: [N7]
    used_in: [Prax4, Prax5, Prax8]

  - id: "T8'"
    type: corollary
    name: "TVI — cas particulier zero"
    statement: "Si f(a).f(b) < 0, il existe c dans ]a,b[ tel que f(c) = 0"
    status: corollaire
    concepts: [N7]
    used_in: [Prax4]

  - id: T9
    type: theorem
    name: "Unicite par monotonie"
    statement: "Si de plus f est strictement monotone sur [a,b], la solution est unique"
    status: demontre
    concepts: [N7]
    used_in: [Prax5]

