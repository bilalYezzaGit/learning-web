    content: "Le TVI garantit l'EXISTENCE mais pas l'UNICITE — la monotonie est necessaire pour l'unicite"
  - id: P3
    content: "L'image d'un intervalle est un intervalle — propriete fondamentale qui sous-tend le TVI"
  - id: P4
