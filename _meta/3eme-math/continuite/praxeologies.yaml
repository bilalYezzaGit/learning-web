# Praxeologies — Continuite
# Cadre theorique : TAD de Chevallard (Tache, Technique, Technologie, Theorie)
# Enrichi avec variables didactiques et profils de difficulte

module: continuite
programme: 3eme-math

praxeologies:
  # -------------------------------------------------------------------------
  - id: Prax1
    name: "Justifier la continuite en un point par le type de fonction"
    concepts: [N2]
    difficulty: 1
    exam_frequency: medium

    task_type: >-
      Montrer que f est continue en a en identifiant son type
      (polynome, rationnelle, sqrt...).
    technique: |
      1. Identifier le type de f (polynome, rationnelle, sqrt, affine)
      2. Citer le theoreme T1 correspondant
      3. Verifier les conditions (a dans le domaine, denominateur non nul, sqrt positive)
      4. Conclure "D'ou f est continue en a"
    common_errors: [E1]
    canonical_examples:
      - "f(x) = 2x^4+4x^3-1 en 0"
      - "f(x) = x^7-3x^4/100+2x+1 en sqrt(2)"

  # -------------------------------------------------------------------------
  - id: Prax2
    name: "Justifier la continuite par les operations"
    concepts: [N3]
    difficulty: 1
    exam_frequency: medium

    task_type: >-
      Montrer que f est continue en a en la decomposant en operations
      de fonctions continues.
    technique: |
      1. Decomposer f en somme/produit/quotient/composition de fonctions continues
      2. Pour chaque composante, citer le theoreme adapte (T2 somme/produit, T3 quotient, T4 |f|, T5 sqrt)
      3. Verifier les conditions (denominateur non nul, sqrt > 0)
      4. Conclure par enchainement
    common_errors: [E3]
    canonical_examples:
      - "f(x) = sqrt(x-2)/(x^2+2x+5) en 2"
      - "f(x) = |2x-1|+sqrt(x+3) en 1"

  # -------------------------------------------------------------------------
  - id: Prax3
    name: "Etudier la continuite d'une fonction par morceaux"
    concepts: [N4, N5]
    difficulty: 2
    exam_frequency: high

    task_type: >-
      Etudier la continuite d'une fonction definie par morceaux sur un
      intervalle ou en un point de raccordement.
    technique: |
      1. Sur chaque morceau ouvert, identifier le type et conclure par T1
      2. Au(x) point(s) de raccordement x0 :
         a. Calculer la limite a gauche
         b. Calculer la limite a droite
         c. Calculer f(x0)
      3. Si les trois sont egaux : f continue en x0
      4. Sinon : f discontinue en x0
    common_errors: [E5]
    canonical_examples:
      - "f(x) = {2x+1 si x>1, 3 si x=1, 3x-1 si x<1}"
      - "f(x) = {x^2 si x<=0, sqrt(x) si x>0}"

  # -------------------------------------------------------------------------
  - id: Prax4
    name: "Appliquer le TVI pour prouver l'existence d'une solution"
    concepts: [N7]
    difficulty: 1
    exam_frequency: very_high

    task_type: >-
      Montrer que l'equation f(x) = 0 (ou f(x) = k) admet au moins une
      solution dans un intervalle donne.
    technique: |
      1. Justifier que f est continue sur [a,b] (par type ou par operations)
      2. Calculer f(a) et f(b)
      3. Constater que k est entre f(a) et f(b) (ou que f(a).f(b) < 0 pour k=0)
      4. Conclure par le TVI : il existe au moins un c dans ]a,b[ tel que f(c) = k
    common_errors: [E2, E4]
    canonical_examples:
      - "f(x) = x^3+3x/2+1, solution dans [-2,1]"
      - "f(x) = 2x^3-3x^2-1, zero dans [1,2]"

  # -------------------------------------------------------------------------
  - id: Prax5
    name: "Prouver l'unicite d'une solution (TVI + monotonie)"
    concepts: [N7]
    difficulty: 2
    exam_frequency: very_high

    task_type: >-
      Montrer que l'equation f(x) = 0 admet une unique solution dans un
      intervalle donne.
    technique: |
      1. Appliquer le TVI pour l'existence (comme Prax4)
      2. Montrer que f est strictement monotone sur [a,b]
         (soit par definition, soit par etude de f')
      3. Conclure : la solution est unique (T9)
    common_errors: [E2]
    canonical_examples:
      - "f(x) = x^3+3x-1, unique solution dans [0,1]"
      - "f(x) = sqrt(x)+x, unique solution de f(x)=3"

  # -------------------------------------------------------------------------
  - id: Prax6
    name: "Determiner l'image d'un intervalle par une fonction continue"
    concepts: [N6]
    difficulty: 2
    exam_frequency: medium

    task_type: "Determiner f(I) pour un intervalle I donne"
    technique: |
      1. Etudier les variations de f sur I (croissante, decroissante, ou changement)
      2. Si f monotone : f([a,b]) = [f(a),f(b)] ou [f(b),f(a)]
      3. Si f change de sens : trouver le(s) extremum(s), composer les images
      4. Attention aux bornes ouvertes/fermees
    common_errors: [E6]
    canonical_examples:
      - "f(x) = x^2 sur [-1, 2], f(I) = [0, 4]"
      - "Lecture d'image depuis un tableau de variation"

  # -------------------------------------------------------------------------
  - id: Prax7
    name: "Approximer une solution par dichotomie"
    concepts: [N8]
    difficulty: 1
    exam_frequency: medium

    task_type: >-
      Encadrer une solution alpha de f(x) = 0 a la precision demandee
      (10^-1, 10^-2).
    technique: |
      1. Partir de l'intervalle [a,b] ou f(a).f(b) < 0
      2. Calculer f(m) ou m = (a+b)/2
      3. Si f(a).f(m) < 0 : solution dans [a,m], sinon dans [m,b]
      4. Repeter jusqu'a la precision souhaitee
    common_errors: []
    canonical_examples:
      - "Encadrer alpha a 10^-2 ou f(x) = x^3-x-1"

  # -------------------------------------------------------------------------
  - id: Prax8
    name: "Determiner le nombre de solutions d'une equation"
    concepts: [N7, N8]
    difficulty: 2
    exam_frequency: high

    task_type: >-
      Montrer que l'equation f(x) = 0 admet exactement n solutions
      (souvent 1, 2, 3 ou 4).
    technique: |
      1. Dresser le tableau de variation complet de f
         (deriver, signe de f', valeurs aux bornes et extrema)
      2. Sur chaque intervalle de monotonie, appliquer TVI + unicite
      3. Compter le nombre total de solutions
    common_errors: [E2]
    canonical_examples:
      - "f(x) = x^4-4x^2-x+1, exactement 4 solutions"
      - "f(x) = 2x^3-3x^2-1, exactement 1 solution"

  # -------------------------------------------------------------------------
  - id: Prax9
    name: "Justifier la continuite de |f| ou sqrt(f)"
    concepts: [N3]
    difficulty: 1
    exam_frequency: low

    task_type: "Montrer que |f| est continue en a, ou que sqrt(f) est continue en a"
    technique: |
      Pour |f| : f continue en a => |f| continue en a (T4, direct).
      Pour sqrt(f) : verifier que f est continue en a ET que f(a) > 0
      (strictement), puis appliquer T5.
    common_errors: [E3]
    canonical_examples:
      - "|x^2-4| continue en 2"
      - "sqrt(x^2+1) continue en tout reel"

  # -------------------------------------------------------------------------
  - id: Prax10
    name: "Montrer la continuite par la definition alpha-beta"
    concepts: [N1]
    difficulty: 2
    exam_frequency: low

    task_type: >-
      Montrer que f est continue en a en utilisant directement la definition
      (trouver alpha en fonction de beta).
    technique: |
      1. Ecrire |f(x)-f(a)| et simplifier
      2. Majorer |f(x)-f(a)| en fonction de |x-a|
      3. Choisir alpha = beta/K (ou K est le coefficient de majoration)
      4. Conclure : pour tout beta > 0, prendre alpha = ... pour que |f(x)-f(a)| < beta
    common_errors: []
    canonical_examples:
      - "f(x) = 2x-1 en a=2 (alpha = beta/2)"
      - "f(x) = x^2 en a (restriction locale)"
