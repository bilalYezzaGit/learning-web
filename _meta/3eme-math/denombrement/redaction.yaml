# Modeles de redaction — Denombrement
# Templates structures par praxeologie pour generation LLM et correction
# Chaque modele decrit EXACTEMENT comment un bon eleve doit rediger

module: denombrement
programme: 3eme-math

redaction_models:
  # -------------------------------------------------------------------------
  - praxeology: Prax2
    name: "Identification du modele de tirage et principe multiplicatif"

    template: |
      Il s'agit d'un tirage {type_tirage}.
      {justification_modele}

      {application_formule}

      D'ou le nombre de {objets} est ${resultat}$.

    variants:
      type_tirage:
        simultane: "simultane (on choisit $p$ elements parmi $n$ sans ordre)"
        successif_sans_remise: "successif sans remise ($p$ elements parmi $n$, l'ordre compte)"
        successif_avec_remise: "successif avec remise ($p$ choix parmi $n$ possibilites a chaque etape)"
      justification_modele:
        simultane: "L'ordre n'intervient pas, donc on utilise les combinaisons."
        successif_sans_remise: "L'ordre intervient et il n'y a pas de remise, donc on utilise les arrangements."
        successif_avec_remise: "L'ordre intervient et il y a remise, donc on utilise $n^p$."
      application_formule:
        combinaison: "$C_{n}^{p} = \\frac{{n}!}{{p}!({n}-{p})!} = {calcul}$"
        arrangement: "$A_{n}^{p} = \\frac{{n}!}{({n}-{p})!} = {calcul}$"
        puissance: "${n}^{p} = {calcul}$"

    expected_lines: { min: 3, typical: 5, max: 6 }

    grading_criteria:
      - criterion: "Identification correcte du modele de tirage"
        weight: 0.4
        required: true
      - criterion: "Justification du choix (ordre ? remise ?)"
        weight: 0.3
        required: true
      - criterion: "Calcul numerique correct"
        weight: 0.3
        required: true

  # -------------------------------------------------------------------------
  - praxeology: Prax4b
    name: "Anagrammes avec lettres repetees"

    template: |
      Le mot ${mot}$ comporte ${n}$ lettres :
      {tableau_frequences}

      Le nombre d'anagrammes est :
      $\frac{{n}!}{{denominateur}} = {calcul} = {resultat}$

    variants:
      tableau_frequences:
        liste: "- {lettre_1} apparait ${p_1}$ fois\n- {lettre_2} apparait ${p_2}$ fois\n..."
        inline: "${lettre_1}$ ($\\times {p_1}$), ${lettre_2}$ ($\\times {p_2}$), ..."

    expected_lines: { min: 4, typical: 6, max: 8 }

    grading_criteria:
      - criterion: "Identification de toutes les lettres et leurs frequences"
        weight: 0.3
        required: true
      - criterion: "Formule correcte n! / (p1! x p2! x ... x pk!)"
        weight: 0.3
        required: true
      - criterion: "Calcul numerique correct"
        weight: 0.2
        required: true
      - criterion: "Verification que la somme des frequences = n"
        weight: 0.2
        required: false

  # -------------------------------------------------------------------------
  - praxeology: Prax5a
    name: "Calcul direct de combinaisons"

    template: |
      {identification_contexte}

      Le nombre de facons de choisir ${p}$ elements parmi ${n}$ est :
      $C_{{n}}^{{p}} = \frac{{n}!}{{p}!({n}-{p})!} = {calcul} = {resultat}$

    variants:
      identification_contexte:
        tirage: "Il s'agit d'un tirage simultane de ${p}$ elements parmi ${n}$."
        sous_ensemble: "On cherche le nombre de sous-ensembles de cardinal ${p}$ d'un ensemble de cardinal ${n}$."
        geometrique: "Le nombre de {objets_geometriques} est le nombre de facons de choisir ${p}$ points parmi ${n}$."

    expected_lines: { min: 3, typical: 4, max: 5 }

    grading_criteria:
      - criterion: "Identification correcte de n et p"
        weight: 0.3
        required: true
      - criterion: "Justification de l'absence d'ordre"
        weight: 0.3
        required: true
      - criterion: "Calcul numerique correct"
        weight: 0.4
        required: true

  # -------------------------------------------------------------------------
  - praxeology: Prax6
    name: "Methode du complementaire"

    template: |
      **Nombre total** de {configurations} (sans contrainte) :
      ${formule_total} = {total}$

      **Nombre de {configurations_contraires}** ({description_contraire}) :
      ${formule_contraire} = {contraire}$

      **Par la methode du complementaire** :
      Nombre de {configurations_voulues} $= {total} - {contraire} = {resultat}$

    expected_lines: { min: 5, typical: 7, max: 10 }

    grading_criteria:
      - criterion: "Calcul correct du total"
        weight: 0.25
        required: true
      - criterion: "Identification correcte de l'evenement complementaire"
        weight: 0.25
        required: true
      - criterion: "Calcul correct du complementaire"
        weight: 0.25
        required: true
      - criterion: "Soustraction et conclusion"
        weight: 0.25
        required: true
        must_include: ["complementaire"]

  # -------------------------------------------------------------------------
  - praxeology: Prax7a
    name: "Developpement avec le binome de Newton"

    template: |
      D'apres la formule du binome de Newton avec $a = {a}$, $b = {b}$, $n = {n}$ :

      $(a+b)^n = \sum_{k=0}^{n} C_n^k \, a^{n-k} \, b^k$

      {developpement_ou_terme}

    variants:
      developpement_ou_terme:
        complet: |
          $({a}+{b})^{n} = {terme_0} + {terme_1} + \cdots + {terme_n}$
        coefficient: |
          Le terme en ${variable}^{k}$ correspond a $k = {k}$ :
          $C_{{n}}^{{k}} \cdot {a}^{{n}-{k}} \cdot {b}^{{k}} = {calcul} = {resultat}$

          Le coefficient de ${variable}^{k}$ est $\boxed{{coeff}}$.

    expected_lines: { min: 4, typical: 6, max: 8 }

    grading_criteria:
      - criterion: "Identification correcte de a, b, n"
        weight: 0.2
        required: true
      - criterion: "Ecriture de la formule generale"
        weight: 0.2
        required: true
      - criterion: "Identification du bon rang k"
        weight: 0.3
        required: true
      - criterion: "Calcul numerique correct"
        weight: 0.3
        required: true

  # -------------------------------------------------------------------------
  - praxeology: Prax8
    name: "Denombrement sous contraintes multiples"

    template: |
      {analyse_probleme}

      **Cas {num_cas_1}** : {description_cas_1}
      {calcul_cas_1}
      Nombre dans ce cas : ${resultat_cas_1}$

      **Cas {num_cas_2}** : {description_cas_2}
      {calcul_cas_2}
      Nombre dans ce cas : ${resultat_cas_2}$

      {cas_supplementaires}

      **Conclusion** : les cas sont disjoints, donc le nombre total est :
      ${resultat_cas_1} + {resultat_cas_2}{autres_termes} = {resultat_final}$

    variants:
      analyse_probleme:
        decomposition: "On decompose en cas disjoints selon {critere_decomposition} :"
        complementaire: "On utilise la methode du complementaire."

    expected_lines: { min: 8, typical: 12, max: 15 }

    grading_criteria:
      - criterion: "Identification des contraintes"
        weight: 0.2
        required: true
      - criterion: "Decomposition correcte en cas disjoints"
        weight: 0.3
        required: true
        must_include: ["cas"]
      - criterion: "Calcul correct dans chaque cas"
        weight: 0.3
        required: true
      - criterion: "Sommation et conclusion"
        weight: 0.2
        required: true
        must_include: ["disjoints", "total"]
