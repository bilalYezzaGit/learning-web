# Lexique et regles redactionnelles — Nombre derive

module: nombre-derive
programme: 3eme-math

# ---------------------------------------------------------------------------
# Notations specifiques au module
# ---------------------------------------------------------------------------
notations:
  - symbol: "f'(a)"
    meaning: "Nombre derive de f en a"
  - symbol: "f'_d(a), f'_g(a)"
    meaning: "Derivees laterales (a droite et a gauche)"
  - symbol: "(f(a+h)-f(a))/h"
    meaning: "Taux de variation de f entre a et a+h"
  - symbol: "(f(x)-f(a))/(x-a)"
    meaning: "Taux de variation de f entre a et x (ecriture equivalente)"
  - symbol: "vec(u)(1, f'(a))"
    meaning: "Vecteur directeur de la tangente en M(a, f(a))"
  - symbol: "C_f, zeta_f, C"
    meaning: "Courbe representative (selon la source tunisienne)"
  - symbol: "(O, vec(i), vec(j))"
    meaning: "Repere orthonorme du plan"
  - symbol: "M(a, f(a))"
    meaning: "Point de la courbe d'abscisse a"
  - symbol: "0,1"
    meaning: "Virgule decimale (convention francaise tunisienne, pas 0.1)"

# ---------------------------------------------------------------------------
# Formules de redaction consacrees
# ---------------------------------------------------------------------------
redaction_formulas:
  ouverture_standard:
    description: "Phrase d'ouverture type"
    template: "Soit f une fonction definie sur un intervalle ouvert I et a un reel de I"

  conclusion_derivable:
    description: "Conclusion quand f est derivable"
    template: "D'ou f est derivable en a et f'(a) = {valeur}"

  conclusion_non_derivable:
    description: "Conclusion quand f n'est pas derivable"
    template: "Donc f n'est pas derivable en a"
    variants:
      point_anguleux: "f admet un point anguleux en a (f'_d(a) = {val_d} ≠ f'_g(a) = {val_g})"
      tangente_verticale: "La courbe admet une demi-tangente verticale en a"

  equation_tangente:
    description: "Equation de la tangente"
    template: >-
      f(a) = {val_fa} et f'(a) = {val_fpa}.
      L'equation de la tangente en M(a, f(a)) est :
      y = f'(a)(x - a) + f(a), soit y = {equation_developpee}.

  approximation_affine:
    description: "Approximation affine"
    template: "f(a+h) ≈ f(a) + h.f'(a) pour h voisin de zero"

  justification_tangente:
    description: "Justification de l'equation de la tangente"
    template: "Toujours preciser f(a) ET f'(a) avant d'ecrire l'equation"

  transitions:
    description: "Formules de transition"
    examples:
      - "D'ou..."
      - "Par suite..."
      - "On en deduit que..."
      - "Il en resulte que..."

  condition_quotient:
    template: "g est derivable en a et g(a) ≠ 0, donc f/g est derivable en a"

  condition_sqrt:
    template: "f est derivable en a et f(a) > 0, donc sqrt(f) est derivable en a"

# ---------------------------------------------------------------------------
# Niveau de rigueur attendu
# ---------------------------------------------------------------------------
rigor_rules:
  - context: "Calcul de nombre derive par la definition"
    rule: "TOUJOURS ecrire le taux de variation dans l'ordre correct : (f(a+h)-f(a))/h"
  - context: "Equation de la tangente"
    rule: "TOUJOURS preciser f(a) et f'(a) avant d'ecrire l'equation"
  - context: "Fonctions par morceaux"
    rule: "TOUJOURS verifier la continuite AVANT la derivabilite"
  - context: "Derivabilite laterale"
    rule: "TOUJOURS preciser le sens des limites (h->0+ pour droite, h->0- pour gauche)"
  - context: "Formule de sqrt(f)"
    rule: "TOUJOURS verifier f(a) > 0 strictement avant d'appliquer T6"
  - context: "Formule du quotient"
    rule: "TOUJOURS verifier g(a) ≠ 0 avant d'appliquer la formule de (f/g)'"
  - context: "Point anguleux vs tangente verticale"
    rule: "TOUJOURS distinguer le type de non-derivabilite et preciser la nature du point"

# ---------------------------------------------------------------------------
# Longueur type des redactions
# ---------------------------------------------------------------------------
typical_lengths:
  - type: "Calcul de nombre derive par la definition"
    lines: { min: 4, typical: 6, max: 8 }
  - type: "Calcul de nombre derive par formule"
    lines: { min: 2, typical: 3, max: 4 }
  - type: "Equation de la tangente"
    lines: { min: 3, typical: 3, max: 4 }
  - type: "Approximation affine"
    lines: { min: 3, typical: 4, max: 5 }
  - type: "Derivabilite laterale (point anguleux)"
    lines: { min: 5, typical: 7, max: 9 }
  - type: "Derivabilite par morceaux (continuite + derivees laterales)"
    lines: { min: 8, typical: 10, max: 12 }
  - type: "Calcul de limite par nombre derive"
    lines: { min: 3, typical: 4, max: 5 }
  - type: "Determination de coefficients (probleme inverse)"
    lines: { min: 6, typical: 8, max: 10 }
