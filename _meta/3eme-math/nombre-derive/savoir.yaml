# ---------------------------------------------------------------------------
# 5) THEOREMES & PROPRIETES CLES
# ---------------------------------------------------------------------------
theorems:
  - id: D1
    type: definition
    name: "Nombre derive (ecriture x->a)"
    statement: >-
      Soit f definie sur un intervalle ouvert I et a un reel de I.
      f est derivable en a s'il existe un reel l tel que
      lim_{x->a} (f(x)-f(a))/(x-a) = l. Le reel l est note f'(a).
    status: definition
    concepts: [N1]
    used_in: [Prax1, Prax2, Prax3]

  - id: "D1'"
    type: definition
    name: "Nombre derive (ecriture h->0)"
    statement: >-
      Ecriture equivalente : f'(a) = lim_{h->0} (f(a+h)-f(a))/h.
    status: definition
    concepts: [N1]
    used_in: [Prax1]

  - id: D2
    type: definition
    name: "Derivees laterales"
    statement: >-
      f'_g(a) = lim_{h->0^-} (f(a+h)-f(a))/h ;
      f'_d(a) = lim_{h->0^+} (f(a+h)-f(a))/h.
    status: definition
    concepts: [N5]
    used_in: [Prax7, Prax8]

  - id: T1
    type: theorem
    name: "Equation de la tangente"
    statement: >-
      Si f est derivable en a, alors la courbe de f admet en M(a,f(a))
      une tangente d'equation y = f'(a)(x-a) + f(a).
    status: demontre
    concepts: [N1]
    used_in: [Prax3, Prax4a, Prax4b]

  - id: T2
    type: theorem
    name: "Approximation affine"
    statement: >-
      Si f est derivable en a, alors f(a+h) = f(a) + h.f'(a) + h.epsilon(h)
      ou lim_{h->0} epsilon(h) = 0. En particulier f(a+h) ≈ f(a) + h.f'(a)
      pour h voisin de 0.
    status: demontre
    concepts: [N2]
    used_in: [Prax5a, Prax5b]

  - id: T3
    type: theorem
    name: "Derivable implique continu"
    statement: "Si f est derivable en a, alors f est continue en a"
    status: demontre
    concepts: [N2]
    used_in: [Prax6a]

  - id: "T3'"
    type: propriete
    name: "Reciproque fausse"
    statement: >-
      La reciproque de T3 est fausse : f continue en a n'implique pas
      f derivable en a.
    status: propriete
    concepts: [N2]
    used_in: [Prax6b]

  - id: T4
    type: theorem
    name: "Nombres derives des fonctions usuelles"
    statement: >-
      Table : constante -> 0, affine ax+b -> a, (x-alpha)^2+beta -> 2(x-alpha),
      x^n -> n.x^(n-1), 1/(alpha.x+beta) -> -alpha/(alpha.x+beta)^2,
      sqrt(x+alpha) -> 1/(2.sqrt(x+alpha)),
      (alpha.x+beta)/(lambda.x+gamma) -> (alpha.gamma-beta.lambda)/(lambda.x+gamma)^2.
    status: demontre
    concepts: [N3]
    used_in: [Prax2]

  - id: T5
    type: theorem
    name: "Operations sur les nombres derives"
    statement: >-
      (f+g)'(a) = f'(a)+g'(a), (alpha.f+beta.g)'(a) = alpha.f'(a)+beta.g'(a),
      (f.g)'(a) = f'(a).g(a)+f(a).g'(a), (f^k)'(a) = k.f^(k-1)(a).f'(a),
      (1/f)'(a) = -f'(a)/f(a)^2 (si f(a)!=0),
      (f/g)'(a) = (f'(a).g(a)-f(a).g'(a))/g(a)^2 (si g(a)!=0).
    status: admis
    concepts: [N4]
    used_in: [Prax2, Prax4a, Prax4b]

  - id: T6
    type: theorem
    name: "Derivee de sqrt(f)"
    statement: >-
      Si f est derivable en a et f(a) > 0, alors
      (sqrt(f))'(a) = f'(a) / (2.sqrt(f(a))).
    status: admis
    concepts: [N4]
    used_in: [Prax2]

  - id: T7
    type: theorem
    name: "Equivalence derivabilite laterale"
    statement: >-
      f est derivable en a si et seulement si f est derivable a droite
      et a gauche en a et f'_d(a) = f'_g(a).
    status: demontre
    concepts: [N5]
    used_in: [Prax7, Prax8]

