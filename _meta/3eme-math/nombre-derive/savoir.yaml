# Savoir — Nombre derive
# Format structure pour lecture humaine (profs) et machine (LLM, pipeline)

module: nombre-derive
programme: 3eme-math
version: 2.0

# ---------------------------------------------------------------------------
# 0) OBJECTIF (1 phrase)
# ---------------------------------------------------------------------------
objective: >-
  Introduire le nombre derive comme limite du taux de variation, maitriser
  son calcul pour les fonctions usuelles et les operations, et l'exploiter
  pour determiner l'equation de la tangente et l'approximation affine.

# ---------------------------------------------------------------------------
# 1) NIVEAU EPISTEMIQUE
# Definit ce qui est admis, demontre ou exclu pour CE programme.
# ---------------------------------------------------------------------------
epistemic_level:
  theory_base: "analyse-reelle-elementaire"
  # Pas de derivation au sens des distributions, pas de differentielles

  admitted:
    - id: T5
      statement: >-
        f+g, f.g, alpha.f+beta.g, f^k, 1/f, f/g sont derivables en a
        si f et g le sont (et conditions : g(a) != 0 pour 1/g et f/g).
      justification: "Admis — demonstration par limites de produits et quotients hors programme"

    - id: T6
      statement: >-
        Si f est derivable en a et f(a) > 0, alors sqrt(f) est derivable
        en a et (sqrt(f))'(a) = f'(a) / (2.sqrt(f(a))).
      justification: "Admis — demonstration par composition hors programme"

  demonstrated:
    - id: T1
      statement: >-
        Si f est derivable en a, alors la courbe de f admet en M(a,f(a))
        une tangente d'equation y = f'(a)(x-a) + f(a).
      proof_type: demonstration-complete

    - id: T2
      statement: >-
        Si f est derivable en a, alors f(a+h) = f(a) + h.f'(a) + h.epsilon(h)
        ou lim_{h->0} epsilon(h) = 0 (approximation affine).
      proof_type: demonstration-complete

    - id: T3
      statement: "Si f est derivable en a, alors f est continue en a"
      proof_type: demonstration-complete

    - id: T4
      statement: >-
        Nombres derives des fonctions usuelles (constante, affine,
        (x-alpha)^2+beta, x^n, 1/(alpha.x+beta), sqrt(x+alpha),
        (alpha.x+beta)/(lambda.x+gamma)) — etablis par le calcul direct
        de la limite du taux de variation.
      proof_type: demonstration-complete

    - id: T7
      statement: >-
        f est derivable en a si et seulement si f est derivable a droite
        et a gauche en a et f'_d(a) = f'_g(a).
      proof_type: demonstration-complete

  excluded:
    - "Fonction derivee (derivee sur tout un intervalle, etude de signe de f') — module fonction-derivee"
    - "Etude de variations, extrema, tableaux de variation — module fonction-derivee"
    - "Derivees successives (f'', f''') — module fonction-derivee"
    - "Derivee de la composee f(ax+b) — module fonction-derivee"
    - "Fonctions trigonometriques — hors programme 3eme"
    - "Theoreme des accroissements finis — hors programme"

  starting_point:
    - "Notion de limite (module generalites-fonctions)"
    - "Operations sur les limites"
    - "Continuite en un point (module continuite)"
    - "Coefficient directeur d'une droite, equation de droite"
    - "Formes indeterminees"

# ---------------------------------------------------------------------------
# 2) TRANSPOSITION DIDACTIQUE
# ---------------------------------------------------------------------------
transposition:
  savoir_savant:
    - "Differentiation au sens de Leibniz-Newton : nombre derive comme taux de variation infinitesimal"
    - "Definition rigoureuse (Weierstrass) : limite du taux de variation"
    - "Lien derivabilite-continuite : derivabilite => continuite (implication stricte)"
    - "Existence de fonctions continues non derivables (fonction de Weierstrass)"

  savoir_a_enseigner:
    - "Le nombre derive est introduit par deux motivations paralleles : la vitesse instantanee (physique) et la pente de la tangente (geometrie)"
    - "Les deux ecritures de la definition sont traitees simultanement : lim_{x->a} (f(x)-f(a))/(x-a) et lim_{h->0} (f(a+h)-f(a))/h"
    - "Le theoreme 'derivable => continu' est demontre (via l'approximation affine)"
    - "La reciproque 'continu => derivable' est refutee par des contre-exemples (|x|, sqrt(x) en 0)"
    - "Les nombres derives des fonctions usuelles sont etablis par le calcul direct de la limite du taux de variation"
    - "L'approximation affine est presentee comme application pratique (estimation numerique)"

  adaptations_didactiques:
    - "Approche progressive : activites -> definition -> proprietes -> exercices"
    - "La vitesse instantanee sert de motivation concrete avant la formalisation"
    - "Les fonctions usuelles sont derivees une par une par calcul direct (pas de formules admises)"
    - "L'approximation affine est illustree par des estimations numeriques comparees a la calculatrice"
    - "La non-derivabilite est illustree graphiquement (point anguleux, tangente verticale)"
    - "La methode de Newton est presentee comme application avancee de la tangente"

# ---------------------------------------------------------------------------
# 3) PREREQUISITES & LIENS INTER-MODULES
# ---------------------------------------------------------------------------
prerequisites:
  required:
    - module: generalites-fonctions
      description: "Ensemble de definition, courbe representative, repere"
    - module: continuite
      description: "Continuite en un point, TVI (utilise pour la methode de Newton)"
    - prior_knowledge: "Limites de fonctions (lim_{x->a}), operations sur les limites, coefficient directeur d'une droite, equation de droite, formes indeterminees"

  opens_toward:
    - module: fonction-derivee
      link: "Derivee comme fonction, formules de derivation, etude de variations"
    - module: fonction-derivee-usuelle
      link: "Derivees des fonctions usuelles sur des intervalles"

