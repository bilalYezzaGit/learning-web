# Lexique et regles redactionnelles — Fonction derivee

module: fonction-derivee
programme: 3eme-math

# ---------------------------------------------------------------------------
# Notations specifiques au module
# ---------------------------------------------------------------------------
notations:
  - symbol: "f', f'(x), f'(a)"
    meaning: "Fonction derivee, derivee en x, nombre derive en a"
  - symbol: "f'', f''', f^(n)"
    meaning: "Derivees successives (seconde, troisieme, n-ieme)"
  - symbol: "f'_d(a), f'_g(b)"
    meaning: "Derivee a droite en a, derivee a gauche en b"
  - symbol: "C_f, zeta_f"
    meaning: "Courbe representative de f (selon la source)"
  - symbol: "(O, vec(i), vec(j))"
    meaning: "Repere orthonorme du plan"

# ---------------------------------------------------------------------------
# Formules de redaction consacrees
# ---------------------------------------------------------------------------
redaction_formulas:
  ouverture_polynome:
    description: "Ouverture standard pour une fonction polynome"
    template: "f est une fonction polynome donc derivable sur R"

  ouverture_rationnelle:
    description: "Ouverture standard pour une fonction rationnelle"
    template: "f est une fonction rationnelle definie et derivable sur D"

  ouverture_sqrt:
    description: "Preambule pour une fonction avec racine"
    template: "f est derivable et strictement positive sur I, donc sqrt(f) est derivable sur I"

  transition_tableau:
    description: "Transition vers le tableau de variation"
    template: "D'ou le tableau de variation de f..."

  conclusion_extremum_local:
    description: "Conclusion pour un extremum local"
    template: "f admet {un max/min} local en a egal a f(a) = ..."

  conclusion_extremum_global:
    description: "Conclusion pour un extremum global"
    template: "Pour tout x dans I, f(x) >= f(a) = ..., donc f(a) est le minimum de f sur I"

  signe_derivee:
    description: "Lien signe de f' et variations"
    template: >-
      f'(x) {>= 0 / <= 0} pour tout x dans I, donc f est
      {croissante / decroissante} sur I.

  condition_necessaire:
    description: "Condition necessaire d'extremum"
    template: >-
      f admet un extremum en a et f est derivable en a,
      donc f'(a) = 0.

  condition_suffisante:
    description: "Condition suffisante d'extremum"
    template: >-
      f'(a) = 0 et f' change de signe en a
      (de + a - : max local / de - a + : min local).

  inegalite_par_derivee:
    description: "Schema de demonstration d'une inegalite"
    template: >-
      Posons h(x) = f(x) - g(x). h'(x) = ... {signe} pour tout x dans I.
      Donc h est {croissante/decroissante} sur I. Or h({borne}) = ...
      Donc h(x) >= 0 pour tout x dans I, d'ou f(x) >= g(x).

# ---------------------------------------------------------------------------
# Niveau de rigueur attendu
# ---------------------------------------------------------------------------
rigor_rules:
  - context: "Calcul de derivee"
    rule: "TOUJOURS montrer les etapes intermediaires (identification de u, v, application de la formule)"
  - context: "Etude de signe de f'"
    rule: "TOUJOURS passer par un tableau de signes complet (pas de test de valeurs)"
  - context: "Tableau de variation"
    rule: "TOUJOURS comporter : ligne x, ligne signe de f', ligne variations de f (fleches + valeurs)"
  - context: "Extremum"
    rule: "TOUJOURS preciser : f'(a) = 0 ET f' change de signe (pas de raccourci)"
  - context: "Optimisation"
    rule: "TOUJOURS revenir au probleme initial apres l'etude de variations"
  - context: "Domaine de derivabilite"
    rule: "TOUJOURS verifier que le domaine est un intervalle avant d'appliquer le theoreme variations-derivee"

# ---------------------------------------------------------------------------
# Longueur type des redactions
# ---------------------------------------------------------------------------
typical_lengths:
  - type: "Calcul de derivee simple"
    lines: { min: 2, typical: 3, max: 4 }
  - type: "Calcul de derivee composee (produit, quotient, sqrt)"
    lines: { min: 4, typical: 5, max: 6 }
  - type: "Etude de variations complete"
    lines: { min: 8, typical: 10, max: 12 }
  - type: "Determination des extrema"
    lines: { min: 4, typical: 6, max: 8 }
  - type: "Probleme d'optimisation"
    lines: { min: 15, typical: 18, max: 20 }
  - type: "Demonstration d'inegalite par la derivee"
    lines: { min: 8, typical: 10, max: 14 }
  - type: "Derivees successives + conjecture"
    lines: { min: 6, typical: 8, max: 12 }
