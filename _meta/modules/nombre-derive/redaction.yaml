# Modeles de redaction — Nombre derive
# Templates structures par praxeologie pour generation LLM et correction
# Chaque modele decrit EXACTEMENT comment un bon eleve doit rediger

module: nombre-derive
programme: 3eme-math

redaction_models:
  # -------------------------------------------------------------------------
  - praxeology: Prax1
    name: "Calcul de f'(a) par la definition"

    template: |
      Calculons $\lim_{h \to 0} \frac{f({a}+h) - f({a})}{h}$.

      $\frac{f({a}+h) - f({a})}{h} = \frac{{expression_developpee}}{h}$

      $= {expression_simplifiee}$

      $\lim_{h \to 0} {expression_simplifiee} = {valeur}$

      Donc $f$ est derivable en ${a}$ et $f'({a}) = {valeur}$.

    variants:
      simplification:
        factorisation: "Factoriser h au numerateur puis simplifier par h"
        rationalisation: "Multiplier par le conjugue au numerateur et au denominateur"
        mise_au_denominateur: "Reduire au meme denominateur puis simplifier par h"

    expected_lines: { min: 4, typical: 6, max: 8 }

    grading_criteria:
      - criterion: "Ecriture correcte du taux de variation"
        weight: 0.2
        required: true
      - criterion: "Simplification algebrique correcte"
        weight: 0.3
        required: true
      - criterion: "Calcul de la limite"
        weight: 0.2
        required: true
      - criterion: "Conclusion avec derivabilite et valeur de f'(a)"
        weight: 0.3
        required: true
        must_include: ["derivable", "f'"]

  # -------------------------------------------------------------------------
  - praxeology: Prax3
    name: "Equation de la tangente"

    template: |
      $f({a}) = {val_fa}$ et $f'({a}) = {val_fpa}$.

      L'equation de la tangente a $C_f$ au point $M({a}, {val_fa})$ est :

      $y = f'({a})(x - {a}) + f({a})$

      $y = {equation_developpee}$

    variants:
      tangente_horizontale:
        oui: "$f'({a}) = 0$, donc la tangente est horizontale : $y = {val_fa}$."
        non: "$y = {val_fpa}(x - {a}) + {val_fa}$, soit $y = {equation_developpee}$."

    expected_lines: { min: 3, typical: 3, max: 4 }

    grading_criteria:
      - criterion: "Calcul de f(a)"
        weight: 0.2
        required: true
      - criterion: "Calcul de f'(a)"
        weight: 0.3
        required: true
      - criterion: "Application correcte de la formule y = f'(a)(x-a) + f(a)"
        weight: 0.3
        required: true
        must_include: ["y ="]
      - criterion: "Simplification de l'equation"
        weight: 0.2
        required: false

  # -------------------------------------------------------------------------
  - praxeology: Prax5a
    name: "Approximation affine directe"

    template: |
      Posons $f(x) = {fonction}$ et $a = {valeur_a}$.

      $f({valeur_a}) = {val_fa}$ et $f'({valeur_a}) = {val_fpa}$.

      D'apres l'approximation affine, pour $h$ voisin de $0$ :
      $f({valeur_a} + h) \approx f({valeur_a}) + h \cdot f'({valeur_a})$

      Donc ${expression_approx} \approx {resultat}$.

    expected_lines: { min: 3, typical: 4, max: 5 }

    grading_criteria:
      - criterion: "Identification correcte de f et a"
        weight: 0.2
        required: true
      - criterion: "Calcul de f(a) et f'(a)"
        weight: 0.3
        required: true
      - criterion: "Application correcte de la formule d'approximation"
        weight: 0.3
        required: true
        must_include: ["≈"]
      - criterion: "Resultat numerique correct"
        weight: 0.2
        required: true

  # -------------------------------------------------------------------------
  - praxeology: Prax7
    name: "Derivabilite a droite et a gauche"

    template: |
      **Derivee a gauche :**
      $f'_g({a}) = \lim_{h \to 0^-} \frac{f({a}+h) - f({a})}{h} = \lim_{h \to 0^-} {expr_gauche} = {val_gauche}$

      **Derivee a droite :**
      $f'_d({a}) = \lim_{h \to 0^+} \frac{f({a}+h) - f({a})}{h} = \lim_{h \to 0^+} {expr_droite} = {val_droite}$

      {conclusion}

    variants:
      conclusion:
        derivable: >-
          $f'_g({a}) = f'_d({a}) = {valeur}$, donc $f$ est derivable en ${a}$
          et $f'({a}) = {valeur}$.
        point_anguleux: >-
          $f'_g({a}) = {val_gauche} \neq f'_d({a}) = {val_droite}$,
          donc $f$ n'est pas derivable en ${a}$. $f$ admet un point anguleux en ${a}$.

          Demi-tangente a gauche : $y = {val_gauche}(x - {a}) + f({a})$.
          Demi-tangente a droite : $y = {val_droite}(x - {a}) + f({a})$.
        tangente_verticale: >-
          $f'_d({a}) = +\infty$ (ou $-\infty$), donc la courbe admet une
          demi-tangente verticale a droite en ${a}$, d'equation $x = {a}$.

    expected_lines: { min: 5, typical: 7, max: 9 }

    grading_criteria:
      - criterion: "Calcul correct de f'_g(a)"
        weight: 0.25
        required: true
      - criterion: "Calcul correct de f'_d(a)"
        weight: 0.25
        required: true
      - criterion: "Comparaison et conclusion"
        weight: 0.25
        required: true
        must_include: ["derivable", "point anguleux"]
      - criterion: "Equations des demi-tangentes (si point anguleux)"
        weight: 0.25
        required: false

  # -------------------------------------------------------------------------
  - praxeology: Prax8
    name: "Derivabilite d'une fonction par morceaux"

    template: |
      **Etape 1 : Continuite en ${a}$**

      $\lim_{x \to {a}^-} f(x) = {lim_gauche}$
      $\lim_{x \to {a}^+} f(x) = {lim_droite}$
      $f({a}) = {f_a}$

      {conclusion_continuite}

      **Etape 2 : Derivees laterales**

      $f'_g({a}) = \lim_{h \to 0^-} \frac{f({a}+h) - f({a})}{h} = {val_fg}$

      $f'_d({a}) = \lim_{h \to 0^+} \frac{f({a}+h) - f({a})}{h} = {val_fd}$

      {conclusion_derivabilite}

    variants:
      conclusion_continuite:
        continue: >-
          Les trois valeurs sont egales a ${valeur}$, donc $f$ est continue en ${a}$.
        discontinue: >-
          $\lim_{x \to {a}^-} f(x) \neq \lim_{x \to {a}^+} f(x)$
          (ou $\neq f({a})$), donc $f$ n'est pas continue en ${a}$.
          Par consequent, $f$ n'est pas derivable en ${a}$ (contraposee de T3).
      conclusion_derivabilite:
        derivable: >-
          $f'_g({a}) = f'_d({a}) = {valeur}$, donc $f$ est derivable en ${a}$
          et $f'({a}) = {valeur}$.
        non_derivable: >-
          $f'_g({a}) = {val_fg} \neq f'_d({a}) = {val_fd}$,
          donc $f$ n'est pas derivable en ${a}$. $f$ admet un point anguleux en ${a}$.

    expected_lines: { min: 8, typical: 10, max: 12 }

    grading_criteria:
      - criterion: "Verification de la continuite (etape 1)"
        weight: 0.3
        required: true
        common_omission: "Beaucoup d'eleves sautent cette etape"
      - criterion: "Calcul des limites laterales de continuite"
        weight: 0.15
        required: true
      - criterion: "Calcul de f'_g(a)"
        weight: 0.15
        required: true
      - criterion: "Calcul de f'_d(a)"
        weight: 0.15
        required: true
      - criterion: "Conclusion finale correcte"
        weight: 0.25
        required: true
        must_include: ["derivable"]

  # -------------------------------------------------------------------------
  - praxeology: Prax9
    name: "Calcul de limite par nombre derive"

    template: |
      Posons $g(x) = {fonction_g}$ et $a = {valeur_a}$.

      On remarque que $g({valeur_a}) = {val_ga}$.

      L'expression $\frac{{numerateur}}{{denominateur}}$ s'ecrit $\frac{g(x) - g({valeur_a})}{x - {valeur_a}}$.

      C'est le taux de variation de $g$ en ${valeur_a}$.

      $g$ est derivable en ${valeur_a}$ et $g'({valeur_a}) = {valeur_derivee}$.

      Donc $\lim_{x \to {valeur_a}} \frac{{numerateur}}{{denominateur}} = g'({valeur_a}) = {valeur_derivee}$.

    expected_lines: { min: 3, typical: 4, max: 6 }

    grading_criteria:
      - criterion: "Identification correcte de g et a"
        weight: 0.3
        required: true
      - criterion: "Reconnaissance du taux de variation"
        weight: 0.3
        required: true
        must_include: ["taux de variation"]
      - criterion: "Calcul de g'(a)"
        weight: 0.2
        required: true
      - criterion: "Conclusion avec la valeur de la limite"
        weight: 0.2
        required: true

  # -------------------------------------------------------------------------
  - praxeology: Prax10
    name: "Determination de coefficients (probleme inverse)"

    template: |
      **Conditions :**
      {liste_conditions}

      **Systeme d'equations :**
      $\begin{cases}
      {equation_1} \\
      {equation_2} \\
      {equation_3}
      \end{cases}$

      **Resolution :**
      {etapes_resolution}

      Donc ${conclusion}$.

    expected_lines: { min: 6, typical: 8, max: 10 }

    grading_criteria:
      - criterion: "Traduction correcte des conditions en equations"
        weight: 0.3
        required: true
      - criterion: "Ecriture du systeme"
        weight: 0.2
        required: true
      - criterion: "Resolution correcte du systeme"
        weight: 0.3
        required: true
      - criterion: "Valeurs finales des coefficients"
        weight: 0.2
        required: true
