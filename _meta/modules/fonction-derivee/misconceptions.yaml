# Misconceptions — Fonction derivee
# Erreurs frequentes des eleves, avec diagnostic et remediation structuree

module: fonction-derivee
programme: 3eme-math

misconceptions:
  # -------------------------------------------------------------------------
  - id: E1
    name: "Croire que f'(a) = 0 suffit pour un extremum"
    category: sur-generalisation
    frequency: tres_frequente

    description: >-
      L'eleve voit f'(a) = 0 et conclut immediatement "f admet un extremum
      en a" sans verifier le changement de signe de f'.

    source_cognitive: >-
      Confusion entre condition necessaire et condition suffisante. Le
      theoreme T10 dit => mais pas <=>.

    detection_patterns:
      - "f'(a) = 0 donc f admet un extremum"
      - "f'(a) = 0 donc maximum"
      - "la derivee s'annule donc extremum"

    diagnostic:
      question: >-
        Soit f(x) = x^3. On a f'(0) = 0. f admet-elle un extremum en 0 ?
      options:
        - label: "Oui, un minimum car f(0) = 0 est la plus petite valeur"
          reveals: "confusion avec la valeur nulle"
        - label: "Oui, un point d'inflexion"
          reveals: "melange des concepts (point d'inflexion hors programme)"
        - label: "Non, car f' ne change pas de signe en 0 (f' = 3x^2 >= 0 partout)"
          correct: true

    remediation:
      explanation: >-
        Toujours verifier le changement de signe de f' apres avoir
        trouve f'(a) = 0. Dresser systematiquement le tableau de signes de f'.
      counter_example: "f(x) = x^3 : f'(0) = 0 mais f' = 3x^2 >= 0, pas de changement de signe, pas d'extremum"
      praxeology_to_practice: Prax5

  # -------------------------------------------------------------------------
  - id: E2
    name: "Erreur de formule dans la derivee d'un quotient"
    category: erreur-technique
    frequency: tres_frequente

    description: >-
      L'eleve ecrit (u/v)' = u'/v' ou (u/v)' = (u'.v + u.v')/v^2
      (signe + au lieu de -).

    source_cognitive: >-
      Confusion avec la formule du produit (f.g)' = f'.g + f.g',
      transposee au quotient sans le signe -.

    detection_patterns:
      - "(u'.v + u.v')/v^2"
      - "u'/v'"
      - "signe + dans la formule du quotient"

    diagnostic:
      question: >-
        La derivee de f(x) = (x+1)/(x-1) est :
      options:
        - label: "f'(x) = 1"
          reveals: "derivee du quotient = quotient des derivees"
        - label: "f'(x) = 2/(x-1)^2"
          reveals: "signe + dans la formule"
        - label: "f'(x) = -2/(x-1)^2"
          correct: true

    remediation:
      explanation: >-
        Moyen mnemotechnique : "au quotient, c'est MOINS" (u'.v - u.v').
        Verifier sur un cas simple connu.
      counter_example: "(1/x)' = (0.x - 1.1)/x^2 = -1/x^2 (pas +1/x^2)"
      praxeology_to_practice: Prax2a

  # -------------------------------------------------------------------------
  - id: E3
    name: "Oublier la condition f > 0 pour (sqrt(f))'"
    category: oubli
    frequency: frequente

    description: >-
      L'eleve applique (sqrt(f))' = f'/(2.sqrt(f)) sans verifier que f est
      strictement positive, ou oublie que sqrt(f) n'est pas derivable aux
      zeros de f.

    source_cognitive: >-
      La condition f > 0 (strictement) est oubliee, l'eleve pense que
      f >= 0 suffit.

    detection_patterns:
      - "f derivable donc sqrt(f) derivable"
      - "(sqrt(f))' = f'/(2.sqrt(f)) sans condition"
      - "derivable en tout point du domaine"

    diagnostic:
      question: >-
        f(x) = sqrt(1-x^2) est-elle derivable en x = 1 ?
      options:
        - label: "Oui, f'(1) = -1/(2.sqrt(0))"
          reveals: "division par zero non detectee"
        - label: "Non, car f(1) = 0 et le taux de variation tend vers -infini"
          correct: true

    remediation:
      explanation: >-
        Aux points ou f(x0) = 0, il faut revenir a la definition (taux de
        variation) pour conclure que sqrt(f) n'est pas derivable (tangente
        verticale).
      counter_example: "sqrt(x) n'est pas derivable en 0 : le taux de variation 1/sqrt(h) -> +infini"
      praxeology_to_practice: Prax3

  # -------------------------------------------------------------------------
  - id: E4
    name: "Confondre f' > 0 (strict) et f' >= 0 pour la croissance stricte"
    category: confusion
    frequency: frequente

    description: >-
      L'eleve croit que f strictement croissante implique f' > 0 partout
      (strictement), et inversement.

    source_cognitive: >-
      Le theoreme dit f' >= 0 <=> f croissante. La croissance stricte
      correspond a f' >= 0 avec f' qui ne s'annule que ponctuellement.

    detection_patterns:
      - "f' >= 0 donc f croissante au sens large"
      - "f' = 0 en un point donc f pas strictement croissante"
      - "f strictement croissante donc f' > 0 partout"

    diagnostic:
      question: >-
        f(x) = x^3 est strictement croissante sur R. Or f'(0) = 0.
        Comment est-ce possible ?
      options:
        - label: "C'est impossible, il y a une erreur"
          reveals: "confusion strict / large"
        - label: "f' >= 0 suffit pour la croissance ; f' peut s'annuler ponctuellement"
          correct: true

    remediation:
      explanation: >-
        Preciser : f strictement croissante <=> f' >= 0 et f' ne s'annule
        pas sur un intervalle entier (elle peut s'annuler en des points isoles).
      counter_example: "x^3 : f'(0) = 0 mais f strictement croissante sur R"
      praxeology_to_practice: Prax4

  # -------------------------------------------------------------------------
  - id: E5
    name: "Ne pas factoriser f' avant l'etude de signe"
    category: erreur-technique
    frequency: frequente

    description: >-
      L'eleve essaie d'etudier le signe de f' sous forme developpee au
      lieu de factoriser.

    source_cognitive: >-
      L'eleve calcule f' correctement mais ne pense pas a factoriser pour
      simplifier l'etude de signe.

    detection_patterns:
      - "signe de f' par test de valeurs"
      - "f' developpee sans factorisation"
      - "etude de signe sans tableau"

    diagnostic:
      question: >-
        f'(x) = 6x^3 + 12x^2 - 18x. Comment etudier le signe ?
      options:
        - label: "Tester des valeurs"
          reveals: "pas de methode systematique"
        - label: "Factoriser : 6x(x^2+2x-3) = 6x(x+3)(x-1), tableau de signes"
          correct: true

    remediation:
      explanation: >-
        Reflexe : toujours mettre en facteur le coefficient commun, puis
        factoriser le polynome restant (racines, discriminant).
      counter_example: "f'(x) = 6x^3+12x^2-18x → 6x(x+3)(x-1), trois zeros, tableau clair"
      praxeology_to_practice: Prax4

  # -------------------------------------------------------------------------
  - id: E6
    name: "Oublier le facteur a dans la derivee de f(ax+b)"
    category: oubli
    frequency: frequente

    description: >-
      L'eleve ecrit (f(ax+b))' = f'(ax+b) en oubliant de multiplier par a.

    source_cognitive: >-
      L'eleve "derive l'interieur" (ax+b)' = a mais oublie de le multiplier.

    detection_patterns:
      - "(f(ax+b))' = f'(ax+b)"
      - "derivee sans le facteur a"
      - "oubli de la derivee de l'interieur"

    diagnostic:
      question: >-
        La derivee de f(x) = (5x-2)^4 est :
      options:
        - label: "f'(x) = 4(5x-2)^3"
          reveals: "oubli du facteur a = 5"
        - label: "f'(x) = 20(5x-2)^3"
          correct: true

    remediation:
      explanation: >-
        Formuler explicitement : "je derive l'exterieur ET je multiplie
        par la derivee de l'interieur". Verifier la coherence dimensionnelle.
      counter_example: "((2x+1)^3)' = 3(2x+1)^2 * 2 = 6(2x+1)^2, pas 3(2x+1)^2"
      praxeology_to_practice: Prax2c

  # -------------------------------------------------------------------------
  - id: E7
    name: "Conclure sur un mauvais intervalle"
    category: confusion
    frequency: occasionnelle

    description: >-
      L'eleve ecrit "f est croissante sur R" alors que f' >= 0 seulement
      sur un sous-intervalle, ou applique le theoreme de part et d'autre
      d'une discontinuite.

    source_cognitive: >-
      Le theoreme s'applique sur un INTERVALLE. Si Df n'est pas un
      intervalle (ex: R\{a}), il faut traiter chaque intervalle separement.

    detection_patterns:
      - "f croissante sur R*"
      - "f decroissante sur son domaine"
      - "f monotone sur R\\{a}"

    diagnostic:
      question: >-
        f(x) = 1/x. f'(x) = -1/x^2 < 0 pour tout x != 0.
        f est-elle decroissante sur R* ?
      options:
        - label: "Oui, f' < 0 partout donc f decroissante sur R*"
          reveals: "R* n'est pas un intervalle"
        - label: "Non : f est decroissante sur ]-inf,0[ et decroissante sur ]0,+inf[ separement"
          correct: true

    remediation:
      explanation: >-
        Verifier que le domaine est un intervalle avant d'appliquer le
        theoreme. Sinon, traiter chaque intervalle.
      counter_example: "1/x : f(-1) = -1 < 1 = f(1) mais f n'est pas croissante sur [-1,1]\\{0}"
      praxeology_to_practice: Prax4
