# Interface META <-> CONTENT
# Contrat stable : les plans de production referencent les IDs definis ici.
# Toute modification des IDs doit etre propagee aux plans existants.
#
# VERSION 4.0 — Simplifie
# Retire : schemas (jamais valides), complexite.yaml (dans booklet-profiles),
# redaction.yaml (DO/DO NOT dans booklet-profiles + examples dans patterns),
# lexique.yaml module (fusionne dans savoir.yaml)

version: 4

# ---------------------------------------------------------------------------
# Programmes declares
# ---------------------------------------------------------------------------
programmes:
  3eme-math:
    label: "3eme Maths (Tunisie)"
    prerequis_graph: 3eme-math/prerequis-graph.yaml
    modules:
      - continuite
      - nombre-derive
      - fonction-derivee
      - denombrement

# ---------------------------------------------------------------------------
# Fichiers par module : 3 fichiers (+ patterns optionnel)
# ---------------------------------------------------------------------------
# savoir.yaml        — theoremes, concepts, prerequisites, notations, exemples
# praxeologies.yaml  — types de taches, techniques, misconceptions
# patterns.yaml      — variantes d'exercices et problemes observes (optionnel)

modules:
  continuite:
    programme: 3eme-math
    savoir: 3eme-math/continuite/savoir.yaml
    praxeologies: 3eme-math/continuite/praxeologies.yaml
    patterns: 3eme-math/continuite/patterns.yaml

  nombre-derive:
    programme: 3eme-math
    savoir: 3eme-math/nombre-derive/savoir.yaml
    praxeologies: 3eme-math/nombre-derive/praxeologies.yaml
    patterns: 3eme-math/nombre-derive/patterns.yaml

  fonction-derivee:
    programme: 3eme-math
    savoir: 3eme-math/fonction-derivee/savoir.yaml
    praxeologies: 3eme-math/fonction-derivee/praxeologies.yaml
    patterns: 3eme-math/fonction-derivee/patterns.yaml

  denombrement:
    programme: 3eme-math
    savoir: 3eme-math/denombrement/savoir.yaml
    praxeologies: 3eme-math/denombrement/praxeologies.yaml
    patterns: 3eme-math/denombrement/patterns.yaml

# ---------------------------------------------------------------------------
# Fichiers racine (globaux)
# ---------------------------------------------------------------------------
root_files:
  lexique: "lexique.yaml"               # Conventions globales (append-only)
  booklet_profiles: "booklet-profiles.yaml"  # Profils cours/examen/exploration

# ---------------------------------------------------------------------------
# Examens
# ---------------------------------------------------------------------------
examens:
  synthese-t3:
    programme: 3eme-math
    spec: 3eme-math/examens/synthese-t3/spec.yaml
    patterns: 3eme-math/examens/synthese-t3/patterns.yaml

# ---------------------------------------------------------------------------
# Composition (append-only)
# ---------------------------------------------------------------------------
# Le lexique global (_meta/lexique.yaml) est la base.
# Chaque savoir.yaml de module ajoute ses notations specifiques dans
# une section `notations:` — pas de fichier lexique.yaml separe par module.

# ---------------------------------------------------------------------------
# Conventions d'identifiants
# ---------------------------------------------------------------------------
identifiers:
  praxeologies: "Prax{N}[a-z]?"
  patterns_exercice: "Prax{N}[a-z]?.v{M}"
  patterns_probleme: "P{N}"
  patterns_examen: "EP{N}"
  theorems: "T{N}, D{N}, P{N} (module-local)"
  concepts: "N{N}[.{N}]? (module-local)"
  misconceptions: "E{N} (module-local)"
  modules: "kebab-case slug"
  programmes: "kebab-case slug"
