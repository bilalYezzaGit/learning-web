kind: livret
title: "Dénombrement — Exploration"
description: "Approfondir le dénombrement à travers des applications réelles, des identités profondes, des paradoxes et des problèmes créatifs : ADN, cryptographie, Braille, chemins, double comptage, poker."
trimester: T2
order: 18
objectives:
  - "Maîtriser les identités du binôme de Newton par spécialisation, dérivation et intégration"
  - "Dénombrer des chemins sur un réseau et modéliser avec des récurrences"
  - "Utiliser le double comptage pour démontrer des identités combinatoires"
  - "Appliquer le dénombrement à des situations réelles (ADN, cryptographie, poker, loterie)"
  - "Découvrir les dérangements, le paradoxe des anniversaires et le triangle de Sierpinski"

