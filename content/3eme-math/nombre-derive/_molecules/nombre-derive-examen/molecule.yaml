      - ex-der-exm-morceaux-parametre
      - quiz:
          - qcm-der-exm-morceaux-prerequis

  - label: "Formules et estimations numeriques"
    steps:
      - ex-der-exm-formules-variees
      - ex-der-exm-estimation-numerique
