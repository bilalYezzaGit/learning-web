kind: livret
title: "Nombre dérivé — Cours et applications directes"
description: "Découvrir le nombre dérivé : définition, tangente, formules, dérivabilité latérale et applications."
trimester: T1
order: 1
objectives:
  - "Calculer le nombre dérivé par la définition et par les formules"
  - "Écrire l'équation de la tangente à une courbe"
  - "Utiliser l'approximation affine pour des estimations"
  - "Étudier la dérivabilité latérale et les fonctions par morceaux"
  - "Calculer des limites par reconnaissance d'un nombre dérivé"

sections:
  - label: "Définition du nombre dérivé"
    steps:
      - lesson-der-definition-taux
      - ex-der-calcul-definition-polynome
      - ex-der-calcul-definition-racine
      - quiz:
          - qcm-der-definition-taux-variation
          - qcm-der-calcul-definition

  - label: "Tangente et approximation affine"
    steps:
      - lesson-der-tangente-approximation
      - ex-der-tangente-directe
      - ex-der-approximation-classiques
      - quiz:
          - qcm-der-equation-tangente
          - qcm-der-approximation-affine

  - label: "Formules de dérivation"
    steps:
      - lesson-der-formules-usuelles-operations
      - ex-der-formules-polynome-rationnelle
      - ex-der-formules-racine-produit
      - quiz:
          - qcm-der-formule-produit
          - qcm-der-condition-racine

  - label: "Dérivabilité latérale"
    steps:
      - lesson-der-laterale-morceaux
      - ex-der-valeur-absolue
      - ex-der-morceaux-raccordement
      - quiz:
          - qcm-der-continuite-vs-derivabilite
          - qcm-der-laterale-definition

  - label: "Applications du nombre dérivé"
    steps:
      - lesson-der-applications
      - ex-der-limite-nombre-derive
      - ex-der-lecture-graphique
      - quiz:
          - qcm-der-reconnaitre-limite
          - qcm-der-lecture-graphique-pente
