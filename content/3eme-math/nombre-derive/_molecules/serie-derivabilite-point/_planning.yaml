kind: planning
module: nombre-derive
programme: 3eme-math
status: validated

# ============================================================================
# Design intent
# ============================================================================
# Serie d'exercices sur la derivabilite en un point, INSPIREE de la serie
# Khammour (meme structure, meme progression, memes praxeologies) mais avec
# des fonctions et enonces originaux.
# Ouvre par 3 lecons-rappels concises, puis enchaine les exercices et QCM.

slug: serie-derivabilite-point
title: "Serie : Derivabilite en un point"
description: >-
  Serie d'exercices couvrant l'etude de la derivabilite en un point, le calcul
  du nombre derive, l'equation de la tangente, l'approximation affine et la
  lecture graphique. Inspiree de la serie Khammour avec des enonces originaux.
trimester: T1
order: 1

sections:
  # ══════════════════════════════════════════════════════════════════════════
  - label: "Rappels de cours"
    atoms:

      - slug: "lesson-der-rappel-definition-tangente"
        type: lesson
        title: "Rappel — Nombre derive et equation de la tangente"
        praxeologies: [Prax1, Prax3]
        contenu: >-
          Rappel concis des notions fondamentales :
          (1) Definition du nombre derive — les deux ecritures equivalentes
          f'(a) = lim_{h->0} (f(a+h)-f(a))/h et f'(a) = lim_{x->a} (f(x)-f(a))/(x-a).
          (2) Interpretation geometrique : f'(a) est la pente de la tangente
          a C_f au point M(a, f(a)).
          (3) Equation de la tangente : y = f'(a)(x-a) + f(a).
          (4) Table des nombres derives des fonctions usuelles : constante,
          affine, x^n, 1/(alpha.x+beta), sqrt(x+alpha).
          (5) Formules des operations : somme, produit (u'v+uv'), quotient,
          racine composee (condition f(a)>0).
          Format compact : definitions encadrees, table recapitulative,
          un exemple illustratif par formule.
        difficulte: 0
        timeMinutes: 8

      - slug: "lesson-der-rappel-approx-continuite"
        type: lesson
        title: "Rappel — Approximation affine et lien avec la continuite"
        praxeologies: [Prax5a, Prax6a, Prax6b]
        contenu: >-
          Rappel concis :
          (1) Approximation affine : f(a+h) ≈ f(a) + h.f'(a) pour h voisin
          de 0. Signification : on remplace localement la courbe par sa tangente.
          (2) Theoreme : derivable en a => continu en a.
          (3) La reciproque est fausse : |x| en 0 est continu mais non derivable
          (point anguleux), sqrt(x) en 0 est continu mais admet une tangente
          verticale.
          Format compact : theoreme encadre, deux contre-exemples avec
          interpretation graphique.
        difficulte: 0
        timeMinutes: 5

      - slug: "lesson-der-rappel-derivabilite-laterale"
        type: lesson
        title: "Rappel — Derivabilite a droite, a gauche et non-derivabilite"
        praxeologies: [Prax7, Prax8]
        contenu: >-
          Rappel concis :
          (1) Derivees laterales : f'_d(a) = lim_{h->0+} et f'_g(a) = lim_{h->0-}
          du taux de variation. Attention : h->0+ => on approche par la droite.
          (2) Theoreme : f derivable en a <=> f'_d(a) = f'_g(a) (les deux finies).
          (3) Point anguleux : f'_d(a) ≠ f'_g(a) (deux demi-tangentes distinctes).
          (4) Demi-tangente verticale : limite infinie du taux de variation d'un cote.
          (5) Pour une fonction par morceaux : toujours verifier la continuite
          AVANT d'etudier la derivabilite.
          (6) Derivabilite sur un intervalle : les points de non-derivabilite
          decoupent le domaine.
          Format compact : definitions encadrees, schema d'un point anguleux
          et d'une tangente verticale.
        difficulte: 0
        timeMinutes: 5

  # ══════════════════════════════════════════════════════════════════════════
  - label: "Etude de la derivabilite"
    atoms:

      - slug: "ex-der-etude-derivabilite-variee"
        type: exercise
        title: "Etude de la derivabilite en un point"
        praxeologies: [Prax1, Prax1b, Prax7, Prax8]
        category: application
        contenu: >-
          Etudier la derivabilite de chacune des fonctions suivantes en a :
          (1) f(x) = |x^2-9|(x+3) en a=3, a=-3 et a dans ]-3,3[ ;
          (2) g(x) = (x-2)sqrt(x-2) en a=3 et a=2 ;
          (3) h(x) = |x^2-4| + |x-2| en a=2, a=-2 et a>2 ;
          (4) f(x) = (2x+1)/(x+2) en a=0 et a=1 ;
          (5) f(x) = sqrt(x^2-9) en a=3 et a=5 ;
          (6) f definie par morceaux : (3x^2+x-2)/(x+1) si x≠-1 et f(-1)=-5
          en a=-1 et a=1.
          Pour chaque cas, ecrire le taux de variation, simplifier et calculer
          la limite. Identifier les cas de non-derivabilite (point anguleux,
          demi-tangente verticale).
        difficulte: 2
        timeMinutes: 20

      - slug: "qcm-der-definition-nombre-derive"
        type: qcm
        title: "Definition du nombre derive"
        praxeologies: [Prax1]
        contenu: >-
          Tester la maitrise de la definition du nombre derive : identifier
          la bonne ecriture du taux de variation, distinguer f'(a) existant
          de f'(a) non existant. Cibler l'erreur E3 (signe) et E6 (gauche/droite).
        difficulte: 1
        timeMinutes: 2

      - slug: "qcm-der-continuite-derivabilite"
        type: qcm
        title: "Continuite et derivabilite"
        praxeologies: [Prax6a, Prax6b]
        contenu: >-
          Tester la comprehension du lien continuite-derivabilite : identifier
          les implications vraies et fausses (derivable => continu, continu
          n'implique pas derivable). Cibler l'erreur E1.
        difficulte: 1
        timeMinutes: 2

  # ══════════════════════════════════════════════════════════════════════════
  - label: "Equation de la tangente"
    atoms:

      - slug: "ex-der-equations-tangentes"
        type: exercise
        title: "Equations de tangentes"
        praxeologies: [Prax2, Prax3]
        category: application
        contenu: >-
          Ecrire l'equation de la tangente a C_f au point d'abscisse a pour :
          (1) f(x) = 2x^3 - 3x^2 + 4 en a = -1 ;
          (2) f(x) = (x-2)sqrt(x-2) en a = 3 ;
          (3) f(x) = (2x+1)/(x+2) en a = 1.
          Pour chaque cas, calculer f(a) et f'(a) par les formules de
          derivation, puis appliquer y = f'(a)(x-a) + f(a).
        difficulte: 1
        timeMinutes: 15

  # ══════════════════════════════════════════════════════════════════════════
  - label: "Approximation affine"
    atoms:

      - slug: "ex-der-approximation-affine"
        type: exercise
        title: "Approximation affine et estimations numeriques"
        praxeologies: [Prax5a, Prax5b]
        category: application
        contenu: >-
          (1) Donner l'approximation affine au voisinage de 0 de
          f(x) = 1/(1+x).
          (2) En deduire une valeur approchee de 1/1,02 et 1/0,98.
          Identifier f, a=0, h petit, calculer f(0) et f'(0), appliquer
          f(h) ≈ f(0) + h.f'(0), comparer avec la valeur calculatrice.
        difficulte: 1
        timeMinutes: 10

  # ══════════════════════════════════════════════════════════════════════════
  - label: "Fonction par morceaux"
    atoms:

      - slug: "ex-der-fonction-morceaux"
        type: exercise
        title: "Derivabilite d'une fonction definie par morceaux"
        praxeologies: [Prax7, Prax8]
        category: approfondissement
        contenu: >-
          Soit g definie par :
          g(x) = (x-1)sqrt(x+3) si x >= 0 ;
          g(x) = -(x-1)sqrt(x+3) si x < 0.
          (1) Determiner le domaine de definition de g.
          (2) Etudier la derivabilite de g en -3, en 0 et en 1.
          (3) Interpreter graphiquement les resultats (point anguleux,
          demi-tangente verticale, tangente classique).
          Verifier la continuite en 0, calculer les derivees laterales,
          conclure sur la nature geometrique en chaque point.
        difficulte: 2
        timeMinutes: 20

      - slug: "qcm-der-demarche-morceaux"
        type: qcm
        title: "Demarche pour une fonction par morceaux"
        praxeologies: [Prax8]
        contenu: >-
          Tester la demarche pour une fonction par morceaux : faut-il verifier
          la continuite avant la derivabilite ? Cibler l'erreur E2.
        difficulte: 1
        timeMinutes: 2

  # ══════════════════════════════════════════════════════════════════════════
  - label: "Tangente de pente donnee"
    atoms:

      - slug: "ex-der-tangente-pente-donnee"
        type: exercise
        title: "Tangente horizontale, de pente donnee et parallele"
        praxeologies: [Prax2, Prax4a]
        category: application
        contenu: >-
          Soit f(x) = x^2 - 4x + 3.
          (1) Calculer f'(a) pour a reel quelconque.
          (2) Determiner les abscisses des points de C_f ou la tangente :
          (a) est horizontale ;
          (b) a pour coefficient directeur -2 ;
          (c) est parallele a la droite Delta : y = (2/3)x - 1.
          Resoudre f'(a) = 0, f'(a) = -2 et f'(a) = 2/3.
        difficulte: 2
        timeMinutes: 15

  # ══════════════════════════════════════════════════════════════════════════
  - label: "Lecture graphique"
    atoms:

      - slug: "ex-der-lecture-graphique-1"
        type: exercise
        title: "Lecture graphique — derivabilite et asymptotes"
        praxeologies: [Prax13]
        category: application
        contenu: >-
          A partir d'une courbe C_f dans un repere orthonorme, avec une
          asymptote oblique d : y = x - 1 et une asymptote verticale x = -1 :
          (1) Determiner l'ensemble de definition de f.
          (2) f est-elle derivable en 0 ? Si oui, calculer f'(0).
          (3) f est-elle derivable en 2 ? Si oui, calculer f'(2).
          (4) Calculer lim_{x->+∞} [f(x)-(x-1)] et lim_{x->-∞} [f(x)-(x-1)].
          (5) Calculer lim_{x->-1+} f(x) et lim_{x->-1-} f(x).
          Figure cetz : courbe avec un point anguleux en x=0 (pentes -1 et 2),
          passage lisse par (2, 1), asymptote oblique d, asymptote verticale x=-1.
        difficulte: 1
        timeMinutes: 15

      - slug: "ex-der-lecture-graphique-2"
        type: exercise
        title: "Lecture graphique — nombre derive et limites"
        praxeologies: [Prax13, Prax9]
        category: application
        contenu: >-
          A partir d'une courbe C_f avec des asymptotes verticales en x = 1
          et x = -1 :
          (1) Determiner le domaine de definition de f.
          (2) Calculer f'(2) graphiquement.
          (3) Calculer lim_{x->-2} f(x)/(x+2) et lim_{x->3} f(x)/(x-3)
          en reconnaissant des taux de variation (f(-2)=0 et f(3)=0).
          (4) Calculer les limites en +∞, -∞, 1+, 1-, -1+ et -1-.
          Figure cetz : 3 branches, zeros en x=-2 et x=3, asymptote
          horizontale y=0 en ±∞.
        difficulte: 2
        timeMinutes: 15

      - slug: "ex-der-lecture-graphique-3"
        type: exercise
        title: "Lecture graphique — intervalles de derivabilite et variations"
        praxeologies: [Prax13, Prax7, Prax9]
        category: approfondissement
        contenu: >-
          A partir d'une courbe C_f avec une asymptote verticale x = 1,
          un point anguleux en x = -1, un maximum local en x = 0 (f(0) = 2),
          et des zeros en x = -3 et x = -1 :
          (1) (a) Determiner l'ensemble de definition de f.
              (b) Determiner les limites en +∞ et -∞.
          (2) (a) f est-elle derivable en -1 ? Justifier.
              (b) Calculer lim_{x->-3} f(x)/(x+3) en reconnaissant f'(-3),
              et lim_{x->0} [f(x)-2]/x en reconnaissant f'(0).
          (3) Determiner les intervalles sur lesquels f est derivable.
          (4) Dresser un tableau de variations complet de f.
          Figure cetz : courbe avec segment plat pour x<-3, bosse lisse entre
          -3 et -1, point anguleux en -1, puis branches infinies autour de x=1.
        difficulte: 2
        timeMinutes: 20

      - slug: "qcm-der-lecture-graphique"
        type: qcm
        title: "Lecture graphique du nombre derive"
        praxeologies: [Prax13]
        contenu: >-
          A partir d'un extrait de courbe, identifier la pente de la tangente
          en un point donne. Tester l'erreur E4 (f'(a)=0 confondu avec
          non-derivable).
        difficulte: 1
        timeMinutes: 2

