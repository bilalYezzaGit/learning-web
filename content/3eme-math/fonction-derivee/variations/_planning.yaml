slug: "fonction-derivee-variations"
title: "Problemes d'etude de variations"
description: >-
  Problemes complets combinant derivation, variations, extrema,
  derivabilite et tangentes. Chaque probleme est multi-etapes.
difficulte: 2
tags: ["derivee", "variations", "extrema", "tangente"]

atoms:
  - slug: "ex-der-etude-rationnelle-parametree"
    type: exercise
    title: "Etude d'une fonction rationnelle parametree"
    praxeologies: [Prax2a, Prax4, Prax5, Prax6]
    category: probleme
    contenu: >-
      Soit f_m(x) = (x^2 + mx - 3)/(x-1), m reel.
      1) Calculer f'_m(x).
      2) Pour quelle valeur de m, f admet-elle un extremum en 2 ?
      3) Pour quelles valeurs de m, f_m n'admet pas d'extremum ?
      4) Pour m=3 : etudier les variations, dresser le tableau complet,
      determiner les tangentes paralleles a une droite D donnee.
    difficulte: 2
    timeMinutes: 20

  - slug: "ex-der-derivabilite-morceaux-parametree"
    type: exercise
    title: "Derivabilite d'une fonction definie par morceaux"
    praxeologies: [Prax3, Prax4, Prax5]
    category: probleme
    contenu: >-
      f(x) = (x^2-ax)/(x^2+1) si x>1, f(x) = (1-ax^2)/(x-2) si x<=1.
      1) Determiner a pour que f soit continue en 1.
      2) Etudier la derivabilite de f en 1 (derivees a gauche et a droite).
      3) Calculer f' sur chacun des intervalles et dresser le tableau de
      variation complet. Preciser les extrema.
    difficulte: 2
    timeMinutes: 20

  - slug: "ex-der-tangentes-cubique"
    type: exercise
    title: "Tangentes a une courbe cubique"
    praxeologies: [Prax2a, Prax4, Prax10]
    category: probleme
    contenu: >-
      f(x) = (x-2)^2(x+3). C_f sa courbe dans un repere orthonorme.
      D la droite x+y+3=0.
      1) D est-elle tangente a C_f ? Si oui, determiner le point de contact.
      2) Existe-t-il des tangentes a C_f paralleles a D ? Les determiner.
      3) Determiner les tangentes a C_f issues du point A(2,0).
      4) Dresser le tableau de variation de f et preciser les extrema.
    difficulte: 2
    timeMinutes: 20

  - slug: "ex-der-fonction-valeur-absolue"
    type: exercise
    title: "Derivabilite et variations avec valeur absolue"
    praxeologies: [Prax3, Prax4, Prax5]
    category: probleme
    contenu: >-
      f(x) = (x^2 + 4|x| + 3)/(|x| - 1).
      1) Preciser le domaine de definition.
      2) Etudier la derivabilite de f en 0.
      3) Montrer que f est derivable sur R\{0,-1,1} et preciser f'.
      4) Dresser le tableau de variation complet.
      5) En quels points la tangente est parallele a D: x+y=0 ?
    difficulte: 2
    timeMinutes: 20

  - slug: "ex-der-derivee-graphique-reciproque"
    type: exercise
    title: "Lecture graphique et lien f - f'"
    praxeologies: [Prax9, Prax4, Prax5]
    category: approfondissement
    contenu: >-
      On donne le graphique d'une fonction f definie et derivable sur
      [-1.5, 4.5] avec ses tangentes en deux points A et B.
      1) Lire graphiquement f(1), f'(1) et f'(3/2).
      2) Donner l'equation de la tangente au point d'abscisse 1.
      3) Parmi trois courbes proposees, identifier la representation de f'.
      4) Dresser le tableau de variation de f. En deduire le signe de f'
      sur ]-1.5, 4.5[.
      5) Si f' est la derivee d'une fonction g, dresser le tableau de
      variation de g.
    difficulte: 2
    timeMinutes: 15

  - slug: "ex-der-derivees-successives-recurrence"
    type: exercise
    title: "Derivees successives et conjecture"
    praxeologies: [Prax2d, Prax2a]
    category: probleme
    contenu: >-
      1) Soit f(x) = 1/(x+a), a reel.
      a) Verifier que f est derivable sur R\{-a} et calculer f'(x).
      b) Calculer f''(x), f'''(x), f^(4)(x).
      c) Conjecturer une formule pour f^(k)(x), k >= 2.
      d) (Bonus) Prouver par recurrence.
      2) Soit g(x) = (1+x)/(1-x).
      a) Montrer que g(x) = -1 + 2/(1-x).
      b) En deduire g^(k)(x) pour tout k >= 1.
    difficulte: 3
    timeMinutes: 20

  - slug: "ex-der-vrai-faux-justifie"
    type: exercise
    title: "Vrai ou faux sur la derivee et les extrema"
    praxeologies: [Prax3, Prax4, Prax5]
    category: approfondissement
    contenu: >-
      Repondre par vrai ou faux en justifiant.
      1) x->|x| est derivable sur R.
      2) x->sqrt(2x^2+1) est derivable sur ]-inf, 1/2].
      3) Si f'(a)=0 alors f admet un minimum en a.
      4) Si f' = g' sur un intervalle I alors f = g sur I.
      5) f derivable sur ]0,+inf[, f' >= 0 sur ]a,b[ et f(b)=0 :
      alors f <= 0 sur [a,b].
      Chaque reponse doit etre justifiee par une preuve ou un
      contre-exemple.
    difficulte: 2
    timeMinutes: 15
