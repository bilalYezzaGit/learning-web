atoms:
  - slug: "ex-der-rectangle-perimetre-max"
    type: exercise
    title: "Rectangle de perimetre maximal inscrit dans un cercle"
    praxeologies: [Prax7a, Prax4, Prax5, Prax2b]
    category: probleme
    contenu: >-
      Soit C un cercle de rayon 1. On inscrit un rectangle dans C.
      1) Exprimer y en fonction de x et en deduire le perimetre p(x).
      2) Etudier sur [0,1] les variations de p (derivee avec sqrt).
      3) En deduire les dimensions du rectangle de perimetre maximal.
      4) Faire une figure et montrer que c'est un carre.
    difficulte: 3
    timeMinutes: 20

  - slug: "ex-der-optimisation-bus"
    type: exercise
    title: "Revenu maximal d'une compagnie de bus"
    praxeologies: [Prax7b, Prax4, Prax5]
    category: probleme
    contenu: >-
      Une compagnie loue des bus de 60 places a des groupes de 15+.
      Tarif : 90 dinars/pers pour 15 pers, reduit de n dinars si n pers
      s'ajoutent. R(n) = (15+n)(90-n).
      1) Verifier l'expression de R(n).
      2) Etudier les variations de f(x)=(15+x)(90-x) sur [0,65].
      3) Trouver le reel x_0 ou f atteint son maximum.
      4) Encadrer x_0 entre deux entiers m et m+1. Comparer f(m) et f(m+1).
      5) Conclure : quel effectif maximise le revenu ?
    difficulte: 3
    timeMinutes: 15

  - slug: "ex-der-inegalite-racine"
    type: exercise
    title: "Inegalites avec racine et derivee"
    praxeologies: [Prax8, Prax4]
    category: probleme
    contenu: >-
      1) a) Montrer que 1-x <= 1/(1+x) pour tout x >= 0.
      b) En deduire que 1-x <= 1/sqrt(1+x) pour tout x >= 0.
      2) Montrer que sqrt(1+x) <= 1 + x/2 pour tout x >= 0.
      3) Soit f(x) = 1 + x/4 - 1/x^2 - (3/7)x.
      a) Calculer f'. b) Utiliser la question 1 pour deduire le signe de f'.
      c) En deduire que 1 + x/4 <= sqrt(1+x) pour x >= 0 (encadrement).
    difficulte: 3
    timeMinutes: 20

  - slug: "ex-der-polynome-degre4"
    type: exercise
    title: "Etude complete d'un polynome de degre 4"
    praxeologies: [Prax1, Prax4, Prax5, Prax8]
    category: synthese
    contenu: >-
      f(x) = -x^4 + 6x^2 - 9x + 1.
      1) Limites en +inf et -inf.
      2) Calculer f'(x) et etudier son signe.
      3) a) Tableau de variation. b) Extrema locaux.
      c) Montrer que f(x)=0 admet exactement 3 racines (utiliser le TVI
      et le tableau). d) Encadrer chaque racine a 10^{-1} pres.
      4) Discussion : nombre de solutions de f(x)=m selon m reel.
    difficulte: 3
    timeMinutes: 20

  - slug: "ex-der-triangle-aire-maximale"
    type: exercise
    title: "Triangle d'aire maximale inscrit dans un cercle"
    praxeologies: [Prax7a, Prax2b, Prax4, Prax5]
    category: probleme
    contenu: >-
      Soit C un cercle de rayon 1, A un point fixe sur C, H le projete
      de O sur la droite perpendiculaire en H.
      1) Calculer l'aire f(x) = (1-x).sqrt(1-x^2) du triangle AMM'.
      2) Etudier la derivabilite de f en -1 et 1. Tangentes en ces points.
      3) Dresser le tableau de variation de f sur [-1,1].
      4) Montrer que le triangle d'aire maximale est equilateral.
    difficulte: 3
    timeMinutes: 20

  - slug: "ex-der-distance-minimale-parabole"
    type: exercise
    title: "Distance minimale d'un point a une parabole"
    praxeologies: [Prax7a, Prax4, Prax5]
    category: probleme
    contenu: >-
      P est la parabole y=x^2. A(0,1) est un point fixe. M un point
      de P d'abscisse x.
      1) Montrer que AM^2 = x^4 - x^2 + 1.
      2) Etudier les variations de f(x) = x^4 - x^2 + 1.
      3) AM minimale <=> AM^2 minimal. Trouver les positions de M.
      4) Calculer la distance minimale.
    difficulte: 3
    timeMinutes: 15

  - slug: "ex-der-casserole-metal-minimal"
    type: exercise
    title: "Casserole de contenance fixe a metal minimal"
    praxeologies: [Prax7a, Prax4, Prax5]
    category: probleme
    contenu: >-
      Casserole cylindrique de contenance 1L.
      x = rayon du cercle interieur, h = hauteur.
      1) Exprimer h en fonction de x.
      2) Montrer que la surface S(x) = pi.x^2 + 2000/x.
      3) Etudier les variations de S.
      4) En deduire que le metal est minimal quand h = x
      (la hauteur egale le rayon).
    difficulte: 3
    timeMinutes: 15

  - slug: "ex-der-famille-fonctions-extrema"
    type: exercise
    title: "Famille de fonctions parametrees et extrema"
    praxeologies: [Prax6, Prax4, Prax5]
    category: probleme
    contenu: >-
      f_m(x) = (2m-3)x^3 + 3x^2 - 3mx + m, m reel.
      1) Pour quelles valeurs de m, f_m possede un seul extremum ?
      2) Pour quelles valeurs de m, f_m est decroissante sur tout R ?
      3) Pour m = 1 : etudier les variations de g(x) = -x^3 + 3|x^2-x| + 1.
      Dresser le tableau complet. Preciser les points anguleux et les
      vecteurs directeurs des demi-tangentes.
    difficulte: 3
    timeMinutes: 20

  - slug: "ex-der-extremum-quadratique-lieu"
    type: exercise
    title: "Famille de paraboles et lieu des extrema"
    praxeologies: [Prax6, Prax4, Prax5]
    category: synthese
    contenu: >-
      f(x) = ax^2 + bx + c, a non nul.
      1) Determiner b et c en fonction de a sachant que la courbe
      passe par A(1,0) et B(0,1).
      2) Calculer les coordonnees de l'extremum de f pour chaque a.
      3) a) Quel est l'ensemble des points associes a ces extrema
      quand a varie ? b) Dresser le tableau de variation de la fonction
      qui decrit cet ensemble.
    difficulte: 3
    timeMinutes: 15
